    createTo: CREATE To # Menu option continuation
    newQueryEditorWindows: "Yangi so'rov muharriri oynalari" # Sub-menu option
    step4: Chiqarilgan SQL tarkibini nusxalang va ushbu modalga joylang # Instruction step 4

  # ========================================
  # Oracle Import - Oracle database instructions
  # ========================================
  oracle:
    title: Oracle # Database selector option (import modal)
    description: "Quyidagi buyruqlarni qo'lda bajaring, so'ngra SQL faylini yuklash uchun" # Description intro
    uploadSql: ".sql faylini yuklash" # Upload button label
