    exportSchema: Muayyan sxemani dump fayliga eksport qiling # Command 3 description
    convertDump: Dump faylini SQL fayliga aylantiring # Command 4 description

  # ========================================
  # Snowflake Import - Snowflake database instructions
  # ========================================
  snowflake:
    title: Snowflake # Database selector option (import modal)
    description: "Qo'lda quyidagi buyruqni bajaring:" # Description intro
    getDdl: GET_DDL # Command name
    descriptionSuffix: "va natijani ekrandagi matn kiritish maydoniga nusxalang (paste) yoki faylga saqlab, yuklash tugmasi orqali yuklang:" # Description suffix
    uploadSql: ".sql faylini yuklash" # Upload button label
