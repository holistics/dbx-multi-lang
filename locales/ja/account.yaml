    email: メール

    connectedAccounts:
      title: 連携済みアカウント
      noAccounts: 連携済みアカウントはありません
      loggedInWith: "{provider}でログイン中"

    manageTitle: アカウント管理
    changeEmail: メールアドレスを変更
    changeEmailInProgress: メールアドレスの変更が進行中です。しばらくお待ちください
    changeEmailFailed: 前回のメール変更に失敗しました。dbdiagram@holistics.io までお問い合わせください

    removal:
      removeAccount: アカウントを削除
      cancelRequest: 削除リクエストをキャンセル
      removedAfter: "アカウントは{time}後に削除されます。"
      aFewHours: 数時間
      aDay: 1日
      days: "{count}日"
      cancelSuccess: 削除リクエストが正常にキャンセルされました！
      status:
        inProgressTitle: アカウントの削除が進行中です。
        inProgressDescription: 数分かかる場合があります。このウィンドウを閉じても安全です — プロセスはバックグラウンドで続行されます。
        completedTitle: アカウントが正常に削除されました。
        completedDescription: "このウィンドウを閉じても安全です。注意: 自動的にログアウトされません。他のデバイスから手動でログアウトしてください。"
        failedTitle: アカウントの削除に失敗しました。
        failedContactSupport: サポートチームにお問い合わせください：

    notifications:
      profileUpdated: ユーザープロフィールが正常に更新されました。
      profileImageUpdated: プロフィール画像が正常に更新されました。
    profileImage:
      title: ユーザープロフィール画像
      switchToGravatar: Gravatarのプロフィール画像に切り替える
      switchToGravatarHint: アバターを変更するには、Gravatarのプロフィール画像に切り替えてください。
      redirectingToGravatar: Gravatarにリダイレクト中...
      changeOnGravatar: Gravatarでプロフィール画像を変更する
      doneUploading: Gravatarに画像をアップロードしましたか？
      gravatarHint: メールアドレスでGravatarにログインしてプロフィール写真を変更してください。
      refresh: プロフィール画像を更新する
    userInfo:
      title: ユーザー情報
    dangerZone:
      title: 危険ゾーン
    errors:
      sessionExpired: セッションが期限切れです。再度ログインしてください。
      updateProfileFailed: プロフィールの更新に失敗しました。もう一度お試しください。
      loadProfileFailed: プロフィールの読み込みに失敗しました。ページを更新してください。
      updateProfileImageFailed: プロフィール画像の更新に失敗しました。もう一度お試しください。
      cancelRemovalFailed: アカウント削除リクエストのキャンセルに失敗しました。もう一度お試しください。

  removeAccountModal:
    title: アカウントを削除
    loadingAccountData: アカウントデータを読み込み中…
    steps:
      whatWillBeRemoved: 削除されるもの
      verifyIdentity: 本人確認
      identityVerified: 本人確認済み
      deleteAccount: アカウントを削除
      accountDeleted: アカウントが削除されました
    step1:
      description: "アカウントを削除すると、以下のデータが完全に削除されます:"
      warning: この操作は永続的で元に戻せません。
    step2:
      otpSentTo: に送信された6桁のコードを入力してください
      resendCode: コードを再送信
      resendCodeCooldown: "コードを再送信（{seconds}秒）"
    step3:
      description: アカウントとすべての関連データを完全に削除しようとしています。この操作は元に戻せません。
      confirmButton: アカウントを削除する
    errors:
      generic: エラーが発生しました。もう一度お試しください。
      ssoAccount: SSOアカウントは個人アカウント設定を管理できません。
      removalInProgress: 削除が既に進行中です。

  # ========================================
  # Change Email modal - 4-step email change flow
  # ========================================
  changeEmail:
    title: メール変更

    steps:
      verifyCurrentEmail: 現在のメールを確認
      currentEmailVerified: 現在のメールが確認されました
      enterNewEmail: 新しいメールを入力
      verifyNewEmail: 新しいメールを確認
      newEmailVerified: 新しいメールが確認されました
      confirmChange: 変更を確認
      emailChanged: メールが変更されました

    verifyCurrent:
      description: セキュリティのため、メールを変更するには現在のメールをOTPで確認する必要があります。
      currentEmailLabel: "現在のメール："
      sendCode: コードを送信
      otpSentMessage: メールに6桁のコードを送信しました。コードは4分後に期限切れになります。
      verificationCode: 確認コード
      resendCode: コードを再送信
      resendCodeCooldown: "コードを再送信（{seconds}秒）"
      verify: 確認

    enterNew:
      description: 新しいメールアドレスを入力してください。確認コードを送信して本人確認を行います。
      newEmailLabel: 新しいメールアドレス
      placeholder: 新しいメールを入力
      sendCode: コードを送信

    verifyNew:
      otpSentTo: 6桁のコードを送信しました
      codeExpires: コードは4分後に期限切れになります。
      verificationCode: 確認コード
      resendCode: コードを再送信
      resendCodeCooldown: "コードを再送信（{seconds}秒）"
      back: 戻る
      verify: 確認

    confirm:
      description: メールアドレスを変更しようとしています：
      from: "変更前："
      to: "変更後："
      pleaseNote: ご注意ください：
      noteNotifications: 今後、新しいメールにすべてのアカウント通知（請求、招待など）が届きます。
      noteLogout: 自動的にログアウトされません。他のデバイスから手動でログアウトしてください。
      noteIrreversible: この操作は元に戻せません。
      confirmButton: 変更を確認

    polling:
      inProgressTitle: サービス全体でメールを更新中...
      inProgressText: 数分かかる場合があります。引き続きアプリをご利用いただけます。
      completedText: すべてのサービスでメールが正常に更新されました！
      failedTitle: 一部のサービスで新しいメールの同期に失敗しました。
      failedText: メールは変更されましたが、一部のサービスでは古いメールが表示される場合があります。dbdiagram@holistics.io までお問い合わせください。

    errors:
      invalidEmail: 有効なメールアドレスを入力してください
      incorrectCode: 入力したコードが正しくありません
      codeExpired: 確認コードの有効期限が切れました。新しいコードをリクエストしてください。
      codeAlreadyUsed: このコードは既に使用されています。新しいコードをリクエストしてください。
      requestExpired: 確認リクエストの有効期限が切れました。新しいコードをリクエストしてください。
      emailInUse: このメールは既に別のアカウントで使用されています
      verificationExpired: 確認の有効期限が切れました。最初からやり直してください。
      generic: 問題が発生しました。もう一度お試しください。
