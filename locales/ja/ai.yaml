  quickActionDescriptions:
    createTableGroups: テーブルをドメインと機能ごとに論理グループに整理し、異なる色を付けます
    addTimestampColumns: 監査追跡が必要なテーブルに created_at と updated_at カラムを追加します
    addRelationships: 命名規則に基づいて外部キーリレーションシップを自動検出し追加します
    addIndexes: 外部キーとよく使われるクエリカラムにインデックスブロックを追加します
    learnDatabaseDesign: データベース設計について学ぶ
    cloneSlack: Slack のクローンを作成
    documentDatabase: ドキュメント保存用のデータベースを作成
    todoList: ToDoリストアプリケーションを作成
    remapDataTypes: ターゲットデータベースシステムに合わせてデータ型を変換します
  quickActionSubActions:
