    invalidIntent: |-
      dbdiagram AI へようこそ。

      お手伝いできること：

      • **DBML スキーマ設計** - テーブル、リレーションシップ、データベース構造の作成と変更
      • **データベースのベストプラクティス** - 最適なデータ型、インデックス、制約の提案
      • **スキーマの最適化** - テーブルグループでの整理、タイムスタンプの追加、データ型の再マッピング
      • **クイック変換** - データベースシステム間の変換（PostgreSQL、MySQL、SQL Server など）

      テーブルの作成、リレーションシップの追加を依頼するか、上のクイックアクションを使って始めましょう！
