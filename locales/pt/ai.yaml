# AI Assistant translations - AI panel and features
# UI Areas: Right sidebar AI panel, Welcome modal, Diff viewer

ai:
  # ========================================
  # AI Panel - Right sidebar chat interface
  # ========================================

  panel:
    inputPlaceholder: Pergunte qualquer coisa sobre seu diagrama... # Chat input placeholder (empty state)
    currentChat: Conversa Atual # Current chat section header
    previousChats: Conversas Anteriores # Previous chats section header
    noOtherChats: Nenhuma outra conversa ainda # Empty state (no previous chats)
    sendInstructions: Pressione Enter para enviar, Shift+Enter para nova linha # Input hint (below chat box)
    sendMessage: Enviar mensagem # Send button (tooltip)
    workspaceDisabled: Workspace desativado # Disabled state message (no workspace)
    editPermissionRequired: Permissão de edição necessária # Permission error message
    usageLimitReached: Você usou todo o seu limite de uso para este mês. Por favor, tente novamente em # Usage limit message
    learnMoreAboutUsageLimits: Saiba mais sobre os limites de uso # Link text (usage limit toast)
    chat: Conversa # Chat tab label
    clickToEdit: Clique para editar # Editable message label
    newChat: Nova Conversa # New chat button (sidebar header)
    showChatHistory: Mostrar Histórico de Conversas # Toggle button (shows chat sidebar)
    hideChatHistory: Ocultar Histórico de Conversas # Toggle button (hides chat sidebar)

  # ========================================
  # AI Welcome Modal - First-time user experience
  # ========================================
  welcome:
    title: Bem-vindo ao DBDiagram AI # Welcome modal title
    subtitle: Seu assistente inteligente para design de banco de dados # Welcome modal subtitle

  # ========================================
  # AI Loading States - Message states
  # ========================================
  messages:
    thinking: Pensando... # Loading indicator (AI thinking)
    generating: Gerando... # Loading indicator (schema generation)
    explaining: Explicando... # Loading indicator (explanation)
    error: Algo deu errado. Por favor, tente novamente. # Error message (retryable)
    rateLimit: Você atingiu o limite de uso. Por favor, faça um upgrade para continuar. # Rate limit message

  # ========================================
  # Diff Viewer - AI change comparison
  # ========================================
  diffViewer:
    reject: Rejeitar # Button (reject single change)
    accept: Aceitar # Button (accept single change)
    rejectAll: Rejeitar Tudo # Button (reject all changes)
    acceptAll: Aceitar Tudo # Button (accept all changes)

  # ========================================
  # Token Usage - AI usage tracking
  # ========================================
  tokenUsage:
    used: Usado # Usage counter label (left side)
    usageText: Você usou {percentage} do seu limite de uso # Usage progress text
    tokens: tokens # Unit label (usage display)
    learnMore: Clique para saber mais sobre os limites de uso # Tooltip (usage indicator)
    resetOn: Reinicia em # Label (usage reset date)

  # ========================================
  # AI Response Details - Response metadata
  # ========================================
  assistant:
    dbmlCode: Código DBML # Label (code block header)
    lines: linhas # Unit label (code lines count)

  # ========================================
  # AI Response Messages - Standard responses
  # ========================================
  responseMessages:
    noExplanation: O esquema foi atualizado. Verifique o visualizador de diferenças para revisar as alterações. # Message after schema update
    invalidIntent: "Bem-vindo ao dbdiagram AI.\\n\\nEstou aqui para ajudá-lo com:\\n\\n• **Design de esquema DBML** - Criar e modificar tabelas, relacionamentos e estruturas de banco de dados\\n• **Melhores práticas de banco de dados** - Sugerir tipos de dados, índices e restrições ideais\\n• **Otimização de esquema** - Organizar tabelas com TableGroups, adicionar timestamps, remapear tipos de dados\\n• **Transformações rápidas** - Converter entre sistemas de banco de dados (PostgreSQL, MySQL, SQL Server, etc.)\\n\\nTente me pedir para criar tabelas, adicionar relacionamentos ou use as ações rápidas acima para começar!" # Help message (unrecognized command)

  # ========================================
  # Quick Action Titles - Action card headers
  # ========================================
  quickActionTitles:
    createTableGroups: Criar Grupos de Tabelas # Quick action card 1 title
    addTimestampColumns: Adicionar Colunas de Timestamp # Quick action card 2 title
    addRelationships: Adicionar Relacionamentos # Quick action card 3 title
    addIndexes: Adicionar Índices # Quick action card 4 title
    learnDatabaseDesign: Aprender Design de Banco de Dados # Quick action card 5 title
    cloneSlack: Clonar Slack # Quick action card 6 title
    documentDatabase: Documentar Banco de Dados # Quick action card 7 title
    todoList: Lista de Tarefas # Quick action card 8 title
    remapDataTypes: Remapear Tipos de Dados # Quick action card 9 title

  # ========================================
  # Quick Action Descriptions - Action card subtitles
  # ========================================
  quickActionDescriptions:
    createTableGroups: Organize suas tabelas em grupos lógicos por domínio e funcionalidade com cores distintas # Card 1 description
    addTimestampColumns: Adicione colunas created_at e updated_at às tabelas que precisam de rastreamento de auditoria # Card 2 description
    addRelationships: Detecte e adicione automaticamente relacionamentos de chave estrangeira com base em convenções de nomenclatura # Card 3 description
    addIndexes: Adicione blocos de índice para chaves estrangeiras e colunas consultadas com frequência # Card 4 description
    learnDatabaseDesign: Aprenda sobre design de banco de dados # Card 5 description
    cloneSlack: Crie um clone do Slack # Card 6 description
    documentDatabase: Crie um banco de dados para armazenar documentos # Card 7 description
    todoList: Crie um aplicativo de lista de tarefas # Card 8 description
    remapDataTypes: Converta tipos de dados para corresponder ao seu sistema de banco de dados de destino # Card 9 description

  # ========================================
  # Quick Action Sub-actions - Database type selectors
  # ========================================
  quickActionSubActions:
    postgresql: PostgreSQL # Database selector option
    mysql: MySQL # Database selector option
    sqlServer: SQL Server # Database selector option
    sqlite: SQLite # Database selector option
    oracle: Oracle # Database selector option
