# Billing translations - Pricing, subscriptions, payment
# UI Areas: Pricing page, Billing settings, Upgrade modals

billing:
  # ========================================
  # Billing Buttons - Action buttons
  # ========================================
  buttons:
    upgrade: Fazer Upgrade # Generic upgrade button
    upgradeToPersonalPro: Fazer upgrade para o plano Personal Pro # CTA button (pricing page)
    collaborateWithTeam: Colaborar com o plano Team # CTA button (team plan)

  # ========================================
  # Pricing Page - Pricing table
  # ========================================
  pricing:

  # ========================================
  # Plan Details - Individual plan info
  # ========================================
  plans:
    free:
      features:
        - Até 3 diagramas # Feature list item 1
        - Ferramentas básicas de edição # Feature list item 2
        - Exportar como SQL/PNG # Feature list item 3
        - Suporte da comunidade # Feature list item 4

    pro:
      features:
        - Diagramas ilimitados # Feature list item 1
        - Ferramentas avançadas de edição # Feature list item 2
        - Histórico de versões # Feature list item 3
        - Suporte prioritário # Feature list item 4
        - Exportar como PDF # Feature list item 5
        - Temas personalizados # Feature list item 6

    team:
      features:
        - Tudo do plano Pro # Feature list item 1
        - Colaboração em equipe # Feature list item 2
        - Controles administrativos # Feature list item 3
        - Autenticação SSO # Feature list item 4
        - Suporte prioritário # Feature list item 5
        - Integrações personalizadas # Feature list item 6

  # ========================================
  # Payment Form - Credit card inputs
  # ========================================
  payment:
    paymentMethod: Método de Pagamento # Section label (existing cards)

  # ========================================
  # Billing History - Invoice section
  # ========================================
  billing:

  # ========================================
  # Subscription Management - Subscription actions
  # ========================================
  subscription:

  # ========================================
  # Personal Pro Plan - Plan features list
  # ========================================
  personalPro:

  # ========================================
  # Team Plan - Plan features list
  # ========================================
  team:

  # ========================================
  # Public Pricing - Public pricing page
  # ========================================
  publicPricing:

  # ========================================
  # Upgrade Button - Contextual upgrade
  # ========================================
  upgradeNowBtn:
    ownerOnly: Apenas o proprietário do workspace pode fazer upgrade para o plano Team # Disabled tooltip

  # ========================================
  # Manage Plan Modal - Subscription details
  # ========================================
  managePlanModal:
    loadingSubscription: Carregando informações da assinatura... # Loading skeleton text
    currentPlan: Plano Atual # Section header
    personalPlanForever: Plano Personal - Para Sempre # Plan name display
    unknownPlan: Plano Desconhecido # Fallback plan name
    billedMonthly: Cobrado todo mês # Billing frequency
    billedAnnually: Cobrado todo ano # Billing frequency
    chargeEvery: Cobrado a cada {period} {unit} # Charge description
    cancelledOn: Cancelado em # Cancellation date label
    planDetails: Detalhes do Plano → # Link to plan features
    upgradeDescription: Faça upgrade para nossos planos pagos para obter Níveis de Detalhe, Cor de Cabeçalho e todos os recursos futuros # Upgrade prompt
    nextPayment: Seu próximo pagamento é # Payment section header
    chargedOn: a ser cobrado em # Payment date suffix
    editSubscription: Editar assinatura # Button (payment method)
    switchToMonthly: Mudar para cobrança mensal # Toggle option
    switchToYearly: Mudar para cobrança anual # Toggle option (savings)
    noPaymentMethod: Nenhum método de pagamento # Empty state label
    updatePaymentMethod: Atualizar método de pagamento # Button (add card)
    invoicing: Faturamento # Section header
    lastPayment: Último pagamento # Section header
    editBillingInfo: Editar informações de cobrança # Button (billing details)
    paymentProcessing: Seu pagamento está sendo processado. Por favor, recarregue a página em alguns minutos. # Processing toast

  # ========================================
  # Disabled Card - Disabled workspace state
  # ========================================
  disabledCard:
    personalUpgrade: Faça upgrade do seu workspace pessoal para recursos premium. # Upgrade prompt
    teamReadOnly: O workspace está em modo somente leitura devido ao cancelamento da assinatura. Renove para habilitar a funcionalidade do workspace. # Reactivation prompt

  # ========================================
  # Plan Picking View - Simple pricing view
  # ========================================
  planPickingSimpleView:
    collaborateWithTeamPlan: Colaborar com o Plano Team # Section header
    collaborateWithColleagues: Colabore com seus colegas. # Section subtitle
    manageTeamDiagrams: Gerencie os diagramas da equipe em um só lugar. # Benefit text
    startFreeTrial: Iniciar Teste Gratuito de 7 Dias # CTA button
    learnMore: Saiba mais # Link (learn more)
    pricingFrom: A partir de {currency}{price}/mês # Pricing label
