  # ========================================
  errors:
    inviteMaxEmails: Não é possível convidar mais de 50 e-mails # Validation error
    inviteFailed: Não foi possível convidar. Por favor, tente novamente! # Error toast
    cannotGetCollaborators: Não foi possível obter informações dos colaboradores! # Error toast
    permissionUpdateFailed: Falha ao atualizar permissão # Error toast
    permissionUpdateSuccess: Permissão atualizada com sucesso # Success toast
    inviteSent: Convite enviado # Success toast
    permissionDenied: Permissão Negada # Permission error
    cannotGetWorkspaceParticipants: Não foi possível obter participantes do workspace. Por favor, tente novamente! # Error toast
    cannotGetUserWorkspaces: Não foi possível obter workspaces do usuário. Por favor, tente novamente! # Error toast
    cannotGetWorkspacesSubscription: Não foi possível obter a assinatura dos workspaces. Por favor, tente novamente! # Error toast
    exportSqlFailed: Falha ao exportar SQL. Por favor, atualize seu esquema de banco de dados e tente novamente. # Error toast
    savePdfFailed: Não foi possível salvar o PDF # Error toast
    saveSvgFailed: Não foi possível salvar o SVG # Error toast
    savePngFailed: Não foi possível salvar o PNG # Error toast
    cannotGetDiagrams: Não foi possível obter os diagramas. Por favor, tente recarregar o aplicativo! # Error toast
    cannotRemoveDefaultView: Você não tem permissão para remover a visualização padrão! # Error toast
    cannotRemoveView: Não foi possível remover esta visualização. Por favor, recarregue e tente novamente! # Error toast
    removeViewTitle: Remover Visualização do Diagrama? # Remove view modal title
    removeViewContent: Deseja remover a visualização "{name}"? # Remove view confirmation
    cancel: Cancelar # Cancel button
    removeView: Remover Visualização # Remove view button
    close: Fechar # Close button
    reload: Recarregar # Reload button

  # ========================================
  # Workspace type labels
  # ========================================
  workspaceType:
    personal: Workspace Pessoal # Personal workspace label
    team: Workspace de Equipe # Team workspace label

  # ========================================
