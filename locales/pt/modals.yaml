# Modals translations - Modal dialogs throughout the app
# UI Areas: Share modal, Import modal, Export modal, History modal, Upgrade modals

modals:
  # ========================================
  # Generic modal titles - Common titles
  # ========================================
  titles:
    confirm: Confirmar # Generic confirm modal title
    delete: Excluir # Delete confirmation modal title
    remove: Remover # Remove confirmation modal title
    rename: Renomear # Rename modal title

  # ========================================
  # Confirmation dialogs - Generic and specific
  # ========================================
  confirmation:
    default:
      message: Você realmente deseja continuar esta ação? # Default confirmation message
      checkbox: Não mostrar novamente # Checkbox to disable future confirmations
    deleteDiagram:
      message: Tem certeza que deseja excluir este diagrama? Esta ação não pode ser desfeita. # Delete diagram warning
      warning: "Atenção: esta ação não pode ser desfeita!" # Additional warning
      embedLinkActive: Você tem um link incorporado ativo. # Warning about embed links
      lastViewed: Última visualização # Label for last viewed timestamp
    removeWorkspace:
    removeMember:
      title: Remover Membro # Remove member modal title
      message: Tem certeza que deseja remover este membro do workspace? # Remove member confirmation
      suggestion: Por favor, digite seu e-mail para confirmar. # Input prompt for confirmation

  # ========================================
  # Share modal - Diagram sharing
  # ========================================
  share:
    tabs:
      sharing: Compartilhamento # Sharing tab label
      embedding: Incorporação # Embedding tab label
    generalAccess:
      passwordPlaceholder: Insira a senha # Password input placeholder
      createPassword: Criar # Create password button
      updatePassword: Atualizar # Update password button
      canAccess: pode acessar # Helper text suffix
      copyLink: Copiar link # Copy link button
      updatePasswordButton: Atualizar senha # Update password button
    permissions:
      canEditAndInvite: Pode editar e convidar # Permission label
      canEditAndInviteDesc: Pode editar e convidar pessoas. # Permission description
      canEdit: Pode editar # Permission label
      canEditDesc: Pode editar, mas não convidar pessoas. # Permission description
      canView: Pode visualizar # Permission label
      canViewDesc: Pode visualizar, mas não editar. # Permission description
      remove: Remover # Remove button
      removeDesc: Remover este colaborador. # Remove description
      noAccess: Sem acesso # No access label
      noAccessDesc: Sem acesso a este diagrama # No access description
    invite:
      placeholder: E-mail, separado por vírgula ou espaço # Email input placeholder
      button: Convidar # Invite button
    members:
      you: (você) # Label for current user
    confirmRemoveCollaborator: "Você está prestes a remover <b>{email}</b> dos colaboradores. Por favor, confirme sua ação!" # Remove confirmation message
    errors:
      publicPermissionUpdateFailed: Falha ao atualizar a permissão pública do diagrama. Por favor, tente novamente! # Error toast
      publicPermissionUpdated: Permissão pública do diagrama atualizada! # Success toast
      passwordLength: A senha deve ter entre 6 e 128 caracteres # Validation error
      cannotUpdateDiagramState: Não foi possível atualizar o estado do diagrama # Error toast
      createPasswordFailed: Falha ao criar senha # Error toast
      updatePasswordFailed: Falha ao atualizar senha # Error toast
    success:
      createPasswordSuccess: Senha criada com sucesso # Success toast for password creation
      updatePasswordSuccess: Senha atualizada com sucesso # Success toast for password update
      diagramIsPublic: Diagrama está público agora! # Success toast for making diagram public
      diagramIsPrivate: Diagrama está privado agora! # Success toast for making diagram private
      diagramIsProtected: Diagrama está protegido agora! # Success toast for making diagram protected
    permissionChanged: Suas permissões foram alteradas. Por favor, recarregue para aplicar as mudanças! # Permission change toast
    reload: Recarregar # Reload button
    cannotGetPermission: Não foi possível obter a permissão do diagrama. Por favor, tente novamente! # Error toast
    embedLink:
      title: Link Incorporado # Embed link section title
      lastView: Última visualização # Last viewed label
      customize: Personalize seu link incorporado com as opções # Customize label
      darkMode: Modo escuro # Dark mode toggle label
      highlightRelationships: Destacar relacionamentos # Highlight toggle label
      detailLevel: Nível de detalhe # Detail level dropdown label
      anyoneWithLink: Qualquer pessoa com o link pode visualizar o diagrama incorporado. # Help text
      remove: Deseja remover este link incorporado? Outras pessoas não poderão mais acessá-lo. # Remove confirmation
      generate: Gerar link incorporado # Generate button
      errors:
        cannotGet: Não foi possível obter links incorporados. Por favor, tente novamente! # Error toast
        cannotCreate: Não foi possível criar link incorporado. Por favor, tente novamente! # Error toast
        cannotDelete: Não foi possível excluir link incorporado. Por favor, tente novamente! # Error toast
        cannotUpdate: Não foi possível atualizar as configurações do link incorporado. Por favor, tente novamente! # Error toast
    tooltip:
      viewOnly: A permissão deste usuário está limitada apenas à visualização. # Permission tooltip
      upgradePersonal: Para habilitar a colaboração de edição, faça upgrade do seu workspace pessoal. # Upgrade tooltip
      freeAccount: "Este usuário tem uma conta <b>gratuita</b>." # Free account tooltip
      editAfterUpgrade: "Eles poderão <b>editar</b> o diagrama após o upgrade da conta." # Upgrade tooltip
      collaborationLimit: Você só pode colaborar com # Collaboration limit text
      diagramLimit: Até 4 usuários gratuitos em cada diagrama (atualmente {count} usuários) # Diagram limit text
      workspaceLimit: Até 6 usuários gratuitos em todos os diagramas (atualmente {count} usuários) # Workspace limit text

  # ========================================
  # Private diagram - Password protection
  # ========================================
  private:
    protected: Diagrama protegido # Protected badge
    private: Este diagrama é privado # Private badge
    passwordRequired: Você precisa de uma senha para visualizar este diagrama. # Password required message
    noAccess: Você não tem acesso a este diagrama. # No access message
    enterPassword: Insira sua senha # Password input placeholder
    incorrectPassword: Senha incorreta # Incorrect password error
    tryAgain: Por favor, tente novamente! # Try again button
    viewDiagram: Visualizar Diagrama # View diagram button

  # ========================================
  # Publish modal - Publish to DBDocs
  # ========================================
  publish:
    title: Publicar em # Modal title (publish dropdown)
    dbdocsLink: dbdocs # Link label
    publishButton: Publicar # Publish button
    bullet1: Publique uma documentação de banco de dados visualizável na web do seu diagrama. # Feature bullet point
    bullet2: O documento publicado ficará disponível em uma conta dbdocs vinculada ao e-mail do proprietário do diagrama. # Feature bullet point
    bullet3: Alterações no seu diagrama não atualizarão automaticamente o documento dbdocs. # Feature bullet point
    publishNewOrUpdate: Publicar um novo documento / Atualizar um existente # Section title
    updateExisting: Atualizar um documento existente # Update option
    projectPublicDefault: Seu projeto dbdocs está definido como "público" por padrão. As pessoas podem acessá-lo pelo link. # Public default info
    documentProjectName: Nome do projeto do documento # Project name field label
    enterProjectName: Insira o nome do projeto # Project name placeholder
    options: Opções # Options section title
    passwordProtection: Proteção por senha # Password section title
    passwordOptional: Insira uma senha (opcional) # Password placeholder
    passwordMinLength: A senha deve ter pelo menos 6 caracteres # Password validation
    feedback: Conte-nos seu # Feedback label
    feedbackLink: feedback # Feedback link
    aboutThisFeature: sobre este recurso! # Feedback link suffix
    errorLoadingProjects: Ocorreu um erro ao carregar os projetos publicados. Por favor, entre em contato com nosso suporte em dbdiagram@holistics.io # Error toast
    errorPublishing: Ocorreu um erro ao publicar o projeto. Por favor, entre em contato com nosso suporte em dbdiagram@holistics.io # Error toast
    projectNameEmpty: O nome do projeto não pode estar vazio # Validation error
    projectNameInvalid: O nome do projeto pode conter apenas letras, números, espaço, "-" ou "_" # Validation error
    passwordInvalid: Senha inválida. Por favor, tente novamente! # Validation error

  # ========================================
  # Import modal - Import diagram
  # ========================================
  import:
    instructions: Instruções # Instructions section title
    showInstructions: Mostrar instruções # Show instructions button
    hideInstructions: Ocultar instruções # Hide instructions button
    upload: Enviar {file} # Upload button label
    appendMode: Anexar DBML convertido ao final # Append mode toggle
    modal:
      validating: Validando # Validating modal title
    dbConnection:
      title: Gerar DBML a partir de Conexão Direta com BD # CLI import modal title
      intro1: Este método conecta diretamente ao seu banco de dados e lê o esquema (geralmente do INFORMATION_SCHEMA) para gerar código DBML. # Intro text part 1
      intro2: Tudo é executado na sua máquina local e as credenciais do banco de dados não são rastreadas nem enviadas a lugar nenhum. # Intro text part 2
      intro3: O código é de código aberto a partir do # Intro text part 3
      intro3Link: e pode ser verificado # Link text
      step1: 1. Instalar # Step 1 label
      step1Note: pode ser necessário adicionar # Note text
      step1NoteSudo: antes dos seus comandos no Linux # Sudo note
      step2: 2. Execute o seguinte comando # Step 2 label
      exampleFor: Exemplo para # Example label
      successMessage: 'Arquivo DBML gerado a partir da conexão com o banco de dados: database.dbml' # Success message
      successBigquery: 'Nota: Para BigQuery, seu arquivo de credencial JSON deve conter as seguintes chaves' # BigQuery note
      successSnowflake1: Tentando conectar... # Snowflake step 1
      successSnowflake2: Executando consulta... # Snowflake step 2
      successSnowflake3: Consulta executada com sucesso. # Snowflake step 3
      successSnowflake4: Conexão encerrada com sucesso. # Snowflake step 4
      step3: 3. Copie e cole o DBML gerado no painel de código para visualizar seu banco de dados. # Step 3 label
      databaseTypes:
        mysql: MySQL # Database type label
        postgres: PostgreSQL # Database type label
        mssql: SQL Server # Database type label
        oracle: Oracle # Database type label
        snowflake: Snowflake # Database type label
        bigquery: BigQuery # Database type label

  # ========================================
  # Upgrade modals - Feature upgrade prompts
  # ========================================
  upgrade:
    titles:
      createDiagram: Você atingiu o limite de diagramas! # Diagram limit title
      detailLevels: Você descobriu um recurso pago! # Detail levels title
      detailLevelsDbdocs: Você descobriu um recurso de projetos pagos! # DBDocs detail levels title
      diagramView: Criar visualizações adicionais é um recurso pago # Diagram view title
      headerColor: Você descobriu um recurso pago! # Header color title
      headerColorDbdocs: Você descobriu um recurso de projetos pagos! # DBDocs header color title
      privateDiagram: Você descobriu um recurso pago! # Private diagram title
      stickyNotes: Você descobriu um recurso pago! # Sticky notes title
      stickyNotesDbdocs: Você descobriu um recurso de projetos pagos! # DBDocs sticky notes title
      versionHistory: Você descobriu um recurso pago! # Version history title
      aiAssistant: O Assistente de IA do dbdiagram é um recurso pago # AI assistant title
      tableGroup: Você descobriu um recurso pago! # Table group title
      tableGroupDbdocs: Você descobriu um recurso de projetos pagos! # DBDocs table group title
      invitePeople: Você descobriu um recurso pago! # Invite people title
    descriptions:
      createDiagram: Faça upgrade para nossos planos pagos agora para <b>criações ilimitadas<br>de diagramas</b> e outros recursos avançados! # Description
      detailLevels: Faça upgrade para nossos planos pagos agora para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Grupo de Tabelas e acesso a todos os nossos recursos futuros! # Description
      detailLevelsDbdocs: Faça upgrade do seu projeto para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Grupo de Tabelas e acesso a todos os nossos recursos futuros! # DBDocs description
      diagramView: No plano Gratuito, você só pode salvar a visualização padrão.<br>Faça upgrade para nossos planos pagos agora para <b>visualizações ilimitadas de diagramas</b> e outros recursos avançados! # Description
      headerColor: Faça upgrade para nossos planos pagos agora para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Cor de Relacionamento, Grupo de Tabelas e acesso a todos os nossos recursos futuros! # Description
      headerColorDbdocs: Faça upgrade do seu projeto para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Cor de Relacionamento, Grupo de Tabelas e acesso a todos os nossos recursos futuros! # DBDocs description
      privateDiagram: Faça upgrade para nossos planos pagos agora para proteger seus diagramas com<br><strong>Proteção por Senha, Modo Privado</strong> e outros recursos avançados! # Description
      stickyNotes: Faça upgrade para nossos planos pagos agora para incluir <strong>Notas Adesivas</strong> no seu diagrama<br>e aproveitar outros recursos avançados! # Description
      stickyNotesDbdocs: Faça upgrade do seu projeto para incluir <strong>Notas Adesivas</strong> no seu diagrama<br>e aproveitar outros recursos avançados! # DBDocs description
      versionHistory: Experimente suas ideias livremente com diferentes <b>versões de esquema</b>.<br>Reverta para uma versão anterior quando quiser. # Description
      aiAssistant: Faça upgrade para nossos planos pagos agora para projetar e otimizar seus esquemas de banco de dados<br>com <strong>assistência em linguagem natural com IA</strong> # Description
      tableGroup: Faça upgrade para nossos planos pagos agora para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Grupo de Tabelas e acesso a todos os nossos recursos futuros! # Description
      tableGroupDbdocs: Faça upgrade do seu projeto para obter Níveis de Detalhe, Cor de Cabeçalho,<br>Grupo de Tabelas e acesso a todos os nossos recursos futuros! # DBDocs description
      invitePeople: Faça upgrade para nossos planos pagos agora para colaborar no design de diagramas ER com<br><strong>Convidar Colaboradores, Publicar Diagramas Editáveis</strong> e outros recursos avançados! # Description
    buttons:
      viewPlans: Ver Planos # View plans button
      upgradeProject: Fazer Upgrade do Projeto # Upgrade project button

  # ========================================
  # History modal - Version history
