    deletedUser: Usuário excluído # Deleted user label
    restoreVersion: Restaurar versão # Restore button
    makeCopy: Fazer uma cópia # Copy button
    upgradeTitle: Faça upgrade para visualizar, restaurar e duplicar # Upgrade prompt title
    errors:
      cannotView: Não foi possível visualizar esta versão # Error toast
      cannotCopy: Não foi possível copiar esta versão # Error toast
    restoreConfirmation:
      title: Restaurar esta versão? # Restore confirmation title
      message: Seu diagrama atual será restaurado para esta versão. # Restore message
    success:
      versionCopied: Sua versão foi copiada com sucesso # Success toast
    copiedName: (Restaurado) {name} # Copied version name prefix
    untitled: Sem Título # Untitled diagram label

