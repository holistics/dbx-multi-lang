    publicTooltip: Público - Las personas pueden acceder mediante su enlace # Tooltip de acceso público
    passwordProtectedTooltip: Protegido con contraseña - Las personas pueden acceder mediante su enlace, pero deben introducir la contraseña correcta # Tooltip de acceso protegido
    privateTooltip: Privado - Solo pueden acceder las personas invitadas # Tooltip de acceso privado