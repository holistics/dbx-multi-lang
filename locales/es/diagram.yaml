# Traducciones del editor de diagramas - Interfaz del editor
# Áreas de interfaz: editor de diagramas, barra de herramientas, encabezado, paneles

diagram:
  # ========================================
  # Acceso - Niveles de acceso al diagrama
  # ========================================
  access:
    public: Público # Opción de nivel de acceso
    passwordProtected: Protegido con contraseña # Opción de nivel de acceso
    private: Privado # Opción de nivel de acceso
    publicText: Cualquier persona con el enlace # Descripción del acceso público
    passwordProtectedText: Cualquier persona con el enlace y la contraseña # Descripción del acceso protegido
