    terminalCommand: Corra el siguiente comando en su terminal # Instruction (command block)
    linuxPrefix: En Linux necesitas agregar # Linux-specific note
    sudo: sudo # Sudo command
    linuxSuffix: Antes de # Sudo placement hint
    example: Ejemplo # Command block label
