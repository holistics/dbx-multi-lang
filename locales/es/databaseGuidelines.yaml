    exportSchema: Exportar un esquema específico a un archivo de volcado # Command 3 description
    convertDump: Convertir el archivo de volcado a un archivo SQL # Command 4 description

  # ========================================
  # Snowflake Import - Snowflake database instructions
  # ========================================
  snowflake:
    title: Snowflake # Database selector option (import modal)
    description: Correr el # Description intro
    getDdl: GET_DDL # Command name
