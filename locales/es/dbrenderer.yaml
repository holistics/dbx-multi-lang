# DBRenderer translations - Diagram canvas and panels
# UI Areas: Left sidebar, Canvas toolbar, Bottom-right zoom, Context menus

dbrenderer:
  # ========================================
  # Table Search Panel - Left sidebar (toggle with Ctrl/Cmd+K)
  # ========================================
  tableSearchPanel:
    title: Tablas # Panel title (left sidebar header)
    diagramViews: Vistas del diagrama # Dropdown header for views (table search panel)
    diagramViewsTooltip: Las vistas del diagrama son colecciones de tablas que representan dominios o flujos de trabajo específicos en tu base de datos. # Tooltip for views dropdown
    viewActions: Acciones de vista # Dropdown header for view actions
    cannotRenameOrDelete: No se puede renombrar ni eliminar {name} # Error toast (default view protection)
    rename: Renombrar # Menu option (view context menu)
    delete: Eliminar # Menu option (view context menu)
    reset: Restablecer # Button (resets view to default)
    save: Guardar # Button (saves current view)
    saveAsNew: Guardar como nueva # Button (creates new view)
    searchPlaceholder: Buscar tabla o esquema # Search input placeholder (no groups)
    searchPlaceholderWithGroup: Buscar tabla, esquema o grupo # Search input placeholder (with groups)
    groupBy: Agrupar por # Dropdown to group tables
    showAll: Mostrar todo # Button (shows all tables)
    hideAll: Ocultar todo # Button (hides all tables)
    schema: Esquema # Group by option (group by schema)
    tableGroup: Grupo de tablas # Group by option (group by custom table group)
    noGroup: (sin grupo) # Group label (tables without group)
    defaultView: Vista predeterminada # Label (default view indicator)
    unknownView: Vista desconocida # Label (unknown view name)
    newView: Nueva vista # Button (creates new diagram view)
    copyOfName: Copia de {name} # Default name for copied view

  # ========================================
  # Controller Bar - Top canvas toolbar
  # ========================================
  controllerBar:
    highlightRelationships: Resaltar relaciones # Toggle button (highlights related tables)
    unhighlightRelationships: Quitar resaltado de relaciones # Toggle button (removes highlight)
    enableGrid: Activar cuadrícula # Toggle button (shows grid)
    disableGrid: Desactivar cuadrícula # Toggle button (hides grid)
    addStickyNote: Agregar nota adhesiva # Button (creates new sticky note on canvas)
    searchTables: Buscar tablas # Button (opens table search panel)
    hideTableSearch: Ocultar búsqueda de tablas # Button (closes table search panel)
    enterFullscreen: Entrar en pantalla completa # Button (goes fullscreen)
    exitFullscreen: Salir de pantalla completa # Button (exits fullscreen)

  # ========================================
  # Auto Arrange - Modal dialog (Ctrl/Cmd+Shift+A)
  # ========================================
  autoArrange:
    title: Elige el algoritmo de organización automática # Modal title
    leftRight: Izquierda-derecha # Algorithm option (horizontal layout L→R)
    snowflake: Snowflake # Algorithm option (snowflake schema layout)
    compact: Compacto # Algorithm option (compact layout)
    confirmMessage: Tu diagrama será reorganizado automáticamente y no podrás deshacer la acción. ¿Estás seguro? # Warning in modal body
    confirm: Confirmar (↵) # Confirm button (with Enter shortcut)
    cancel: Cancelar (Esc) # Cancel button (with Escape shortcut)

  # ========================================
  # Detail Level - Dropdown (eye icon)
  # ========================================
  detailLevel:
    title: Nivel de detalle # Dropdown title
    all: Todos los campos # Option (shows all fields)
    tables: Nombres de tablas # Option (only shows table names, hides all fields)
    keys: Solo claves # Option (only shows primary and foreign keys, hides other fields)

  # ========================================
  # View Dropdown - View selector menu
  # ========================================
  viewDropdown:
    renameView: Renombrar vista # Menu option (renames current view)
    removeView: Eliminar vista # Menu option (deletes current view)
    newView: Nueva vista # Menu option (creates new view)
    disabled: (deshabilitado) # Label for restricted views (free users)

  # ========================================
  # Diff Legend - Shown in compare mode
  # ========================================
  diffLegend:
    added: Agregado # Green legend item (new tables)
    modified: Modificado # Yellow legend item (changed tables)
    deleted: Eliminado # Red legend item (removed tables)

  # ========================================
  # Viewport Controller - Bottom-right corner
  # ========================================
  viewportController:
    zoomOut: Alejar (mantén para acelerar) # Zoom out button tooltip
    zoomIn: Acercar (mantén para acelerar) # Zoom in button tooltip
    editZoomLevel: Haz clic para editar el nivel de zoom # Zoom input tooltip
    zoomToFit: Ajustar todos los elementos en la vista # Fit to screen button tooltip
    enablePanMode: Haz clic para activar el modo panorámico # Pan mode toggle tooltip
    disablePanMode: Haz clic para desactivar el modo panorámico # Pan mode toggle tooltip
    panModeHint: O mantén Espacio/clic medio del ratón + arrastra para desplazarte # Hint text for pan mode

  # ========================================
  # Common - Shared buttons in renderer
  # ========================================
  common:

  # ========================================
  # Empty State Hint - Canvas empty states
  # ========================================
  emptyStateHint:
    filtered:
      title: Tu vista de diagrama está vacía # Empty state title (all tables hidden)
      description: Todas las tablas de esta vista están ocultas actualmente. Usa el panel de búsqueda de tablas para mostrar tablas en la vista de diagrama. # Empty state description
      openTableSearchPanel: Abrir panel de búsqueda de tablas # Button (opens sidebar)
    noDbml:
      title: No se encontró ningún esquema de base de datos # Empty state title (no tables in DBML)
      description: Tu código DBML aún no contiene ninguna tabla. Agrega tablas y relaciones para ver tu diagrama. # Empty state description
      startAddingTables: Comenzar a agregar tablas # Button (opens add table modal)

  # ========================================
  # Loading States - Loading indicator messages
  # ========================================
  loading:
    initializingTables: Inicializando tablas... # Loading message (table loading)
    initializingTablesProgress: Inicializando tablas... ({current}/{total}) # Loading with progress
    initializingTableGroups: Inicializando grupos de tablas... # Loading message (group loading)
    initializingTableGroupsProgress: Inicializando grupos de tablas... ({current}/{total}) # Loading with progress
    initializingReferences: Inicializando referencias... # Loading message (relationship loading)
    initializingReferencesProgress: Inicializando referencias... ({current}/{total}) # Loading with progress
    arrangingDiagram: Organizando tu diagrama... # Loading message (layout calculation)
    finalizingDiagram: Finalizando diagrama... # Loading message (render completion)

  # ========================================
  # Filter Config Tags - Filter chips in canvas
  # ========================================
  filterConfigTags:
    all: Todo # Filter chip (shows all items)
    allTables: Todas las tablas # Filter chip (all tables)
    allNotes: Todas las notas # Filter chip (all notes)
    nothing: Nada # Filter chip (nothing shown)
    moreItems: '{count} elementos más:' # Overflow indicator (more filters)

  # ========================================
  # Sticky Notes - Sticky note section
  # ========================================
  stickyNotesSection:
    title: Notas adhesivas # Section title (left sidebar)
  stickyNotes:
    untitledNote: Nota sin título # Default name for new notes
    removeNoteConfirmation: ¿Eliminar tu nota? # Delete confirmation dialog title
    'yes': 'Sí' # Confirm button (delete note)
    'no': 'No' # Cancel button

  # ========================================
  # Table List - Table list in sidebar
  # ========================================
  tableList:
    noTablesFound: No se encontraron tablas # Empty state (search results)

  # ========================================
  # Record Preview - Preview data sample modal
  # ========================================
  recordPreviewModal:
    infoTooltip: Ver filas de ejemplo para entender rápidamente los datos de la tabla
    editBtn:
      title: Editar
      tooltip: Editar muestra de datos
    downloadBtn:
      title: Descargar
      tooltip: Descargar CSV
  # ========================================
  # View Note Modal - Preview/edit markdown note
  # ========================================
  viewNoteModal:
    infoTooltip: Se admite formato con Markdown
    editBtn:
      title: Editar
    cancelBtn: Cancelar
    saveBtn: Guardar
