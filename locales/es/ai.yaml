# AI Assistant translations - AI panel and features
# UI Areas: Right sidebar AI panel, Welcome modal, Diff viewer

ai:
  # ========================================
  # AI Panel - Right sidebar chat interface
  # ========================================

  panel:
    inputPlaceholder: Pregúntame cualquier cosa sobre tu diagrama... # Chat input placeholder (empty state)
    currentChat: Chat actual # Current chat section header
    previousChats: Chats anteriores # Previous chats section header
    noOtherChats: Aún no hay otros chats # Empty state (no previous chats)
    sendInstructions: Presiona Enter para enviar, Shift+Enter para nueva línea # Input hint (below chat box)
    sendMessage: Enviar mensaje # Send button (tooltip)
    workspaceDisabled: Espacio de trabajo deshabilitado # Disabled state message (no workspace)
    editPermissionRequired: Se requiere permiso de edición # Permission error message
    usageLimitReached: Has usado todo tu límite de uso para este mes. Por favor, inténtalo de nuevo el # Usage limit message
    learnMoreAboutUsageLimits: Más información sobre los límites de uso # Link text (usage limit toast)
    chat: Chat # Chat tab label
    clickToEdit: Haz clic para editar # Editable message label
    newChat: Nuevo chat # New chat button (sidebar header)
    showChatHistory: Mostrar historial de chat # Toggle button (shows chat sidebar)
    hideChatHistory: Ocultar historial de chat # Toggle button (hides chat sidebar)

  # ========================================
  # AI Welcome Modal - First-time user experience
  # ========================================
  welcome:
    title: Bienvenido a DBDiagram AI # Welcome modal title
    subtitle: Tu asistente inteligente para diseño de bases de datos # Welcome modal subtitle

  # ========================================
  # AI Loading States - Message states
  # ========================================
  messages:
    thinking: Pensando... # Loading indicator (AI thinking)
    generating: Generando... # Loading indicator (schema generation)
    explaining: Explicando... # Loading indicator (explanation)
    error: Algo salió mal. Por favor, inténtalo de nuevo. # Error message (retryable)
    rateLimit: Has alcanzado el límite de uso. Por favor, mejora tu plan para continuar. # Rate limit message

  # ========================================
  # Diff Viewer - AI change comparison
  # ========================================
  diffViewer:
    reject: Rechazar # Button (reject single change)
    accept: Aceptar # Button (accept single change)
    rejectAll: Rechazar todo # Button (reject all changes)
    acceptAll: Aceptar todo # Button (accept all changes)

  # ========================================
  # Token Usage - AI usage tracking
  # ========================================
  tokenUsage:
    used: Usado # Usage counter label (left side)
    usageText: Has usado el {percentage} de tu límite de uso # Usage progress text
    tokens: tokens # Unit label (usage display)
    learnMore: Haz clic para obtener más información sobre los límites de uso # Tooltip (usage indicator)
    resetOn: Se reinicia el # Label (usage reset date)

  # ========================================
  # AI Response Details - Response metadata
  # ========================================
  assistant:
    dbmlCode: Código DBML # Label (code block header)
    lines: líneas # Unit label (code lines count)

  # ========================================
  # AI Response Messages - Standard responses
  # ========================================
  responseMessages:
    noExplanation: El esquema ha sido actualizado. Revisa el visor de diferencias para ver los cambios. # Message after schema update
    invalidIntent: "Bienvenido a dbdiagram AI.\n\nEstoy aquí para ayudarte con:\n\n• **Diseño de esquemas DBML** - Crear y modificar tablas, relaciones y estructuras de base de datos\n• **Mejores prácticas de bases de datos** - Sugerir tipos de datos óptimos, índices y restricciones\n• **Optimización de esquemas** - Organizar tablas con TableGroups, agregar marcas de tiempo, reasignar tipos de datos\n• **Transformaciones rápidas** - Convertir entre sistemas de bases de datos (PostgreSQL, MySQL, SQL Server, etc.)\n\n¡Intenta pedirme que cree tablas, agregue relaciones, o usa las acciones rápidas de arriba para comenzar!" # Help message (unrecognized command)

  # ========================================
  # Quick Action Titles - Action card headers
  # ========================================
  quickActionTitles:
    createTableGroups: Crear grupos de tablas # Quick action card 1 title
    addTimestampColumns: Agregar columnas de marca de tiempo # Quick action card 2 title
    addRelationships: Agregar relaciones # Quick action card 3 title
    addIndexes: Agregar índices # Quick action card 4 title
    learnDatabaseDesign: Aprender diseño de bases de datos # Quick action card 5 title
    cloneSlack: Clonar Slack # Quick action card 6 title
    documentDatabase: Documentar base de datos # Quick action card 7 title
    todoList: Lista de tareas # Quick action card 8 title
    remapDataTypes: Reasignar tipos de datos # Quick action card 9 title

  # ========================================
  # Quick Action Descriptions - Action card subtitles
  # ========================================
  quickActionDescriptions:
    createTableGroups: Organiza tus tablas en grupos lógicos por dominio y funcionalidad con colores distintos # Card 1 description
    addTimestampColumns: Agrega columnas created_at y updated_at a las tablas que necesitan seguimiento de auditoría # Card 2 description
    addRelationships: Detecta y agrega automáticamente relaciones de clave foránea basadas en convenciones de nomenclatura # Card 3 description
    addIndexes: Agrega bloques de índice para claves foráneas y columnas consultadas frecuentemente # Card 4 description
    learnDatabaseDesign: Aprende sobre diseño de bases de datos # Card 5 description
    cloneSlack: Crea un clon de Slack # Card 6 description
    documentDatabase: Crea una base de datos para almacenar documentos # Card 7 description
    todoList: Crea una aplicación de lista de tareas # Card 8 description
    remapDataTypes: Convierte tipos de datos para que coincidan con tu sistema de base de datos de destino # Card 9 description

  # ========================================
  # Quick Action Sub-actions - Database type selectors
  # ========================================
  quickActionSubActions:
    postgresql: PostgreSQL # Database selector option
    mysql: MySQL # Database selector option
    sqlServer: SQL Server # Database selector option
    sqlite: SQLite # Database selector option
    oracle: Oracle # Database selector option
