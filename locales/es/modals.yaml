      headerColor: ¡Mejora a nuestros planes de pago ahora para obtener Niveles de detalle, Color de encabezado,<br>Color de relación, Grupo de tablas y acceso a todas nuestras próximas funciones! # Description
      headerColorDbdocs: ¡Mejora tu proyecto para obtener Niveles de detalle, Color de encabezado,<br>Color de relación, Grupo de tablas y acceso a todas nuestras próximas funciones! # DBDocs description
      privateDiagram: ¡Mejora a nuestros planes de pago ahora para proteger tus diagramas con<br><strong>Protección con contraseña, Modo privado</strong> y otras funciones avanzadas! # Description
      stickyNotes: ¡Mejora a nuestros planes de pago ahora para incluir<strong> Notas adhesivas </strong> en tu diagrama<br>y aprovechar otras funciones avanzadas! # Description
      stickyNotesDbdocs: ¡Mejora tu proyecto para incluir<strong> Notas adhesivas </strong> en tu diagrama<br>y aprovechar otras funciones avanzadas! # DBDocs description
      versionHistory: Experimenta libremente tus ideas con diferentes <b>versiones del esquema</b>.<br>Vuelve a una versión anterior cuando quieras. # Description
