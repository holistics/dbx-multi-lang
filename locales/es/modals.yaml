      tableGroup: ¡Mejora a nuestros planes de pago ahora para obtener Niveles de detalle, Color de encabezado,<br>Grupo de tablas y acceso a todas nuestras próximas funciones! # Description
      tableGroupDbdocs: ¡Mejora tu proyecto para obtener Niveles de detalle, Color de encabezado,<br>Grupo de tablas y acceso a todas nuestras próximas funciones! # DBDocs description
      invitePeople: ¡Mejora a nuestros planes de pago ahora para colaborar en el diseño de diagramas ER con<br><strong>Invitar colaboradores, Publicar diagramas editables</strong> y otras funciones avanzadas! # Description
    buttons:
      viewPlans: Ver planes # View plans button
      upgradeProject: Mejorar proyecto # Upgrade project button

  # ========================================
