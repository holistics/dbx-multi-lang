    inviteFailed: ¡No se puede invitar, por favor inténtalo de nuevo! # Error toast
    cannotGetCollaborators: ¡No se puede obtener información de los colaboradores! # Error toast
    permissionUpdateFailed: Error al actualizar el permiso # Error toast
