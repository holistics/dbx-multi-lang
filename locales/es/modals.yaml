    keysOnly: Solo claves # Show keys only
    allFields: Todos los campos # Show all fields

  # ========================================
  # Migration preview modal
  # ========================================
  migrationPreview:
    title: Las vistas de diagrama ahora se almacenan en tu DBML
    description: >-
      Hemos movido la configuración de tus vistas de diagrama directamente a tu código DBML como bloques DiagramView.
      Esto hace que tus vistas sean parte de tu código DBML junto con tu esquema.
    learnMore: Más información sobre las vistas de diagrama
    confirm: Continuar
  # ========================================
