      diagramView: Crear vistas adicionales es una función de pago # Diagram view title
      headerColor: ¡Descubriste una función de pago! # Header color title
      headerColorDbdocs: ¡Descubriste una función de proyectos de pago! # DBDocs header color title
      privateDiagram: ¡Descubriste una función de pago! # Private diagram title
      stickyNotes: ¡Descubriste una función de pago! # Sticky notes title
      stickyNotesDbdocs: ¡Descubriste una función de proyectos de pago! # DBDocs sticky notes title
      versionHistory: ¡Descubriste una función de pago! # Version history title
      aiAssistant: El asistente de IA de dbdiagram es una función de pago # AI assistant title
      tableGroup: ¡Descubriste una función de pago! # Table group title
