      invitePeople: Has descubierto una función de pago. # Título de invitar personas
    descriptions:
      createDiagram: Mejora a uno de nuestros planes de pago ahora para tener <b>creación ilimitada<br>de diagramas</b> y otras funciones avanzadas. # Descripción
      detailLevels: Mejora a uno de nuestros planes de pago ahora para obtener niveles de detalle, color de encabezado,<br>grupo de tablas y acceso a todas nuestras próximas funciones. # Descripción
