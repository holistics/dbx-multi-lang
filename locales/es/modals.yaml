# Traducciones de modales - Diálogos modales en toda la aplicación
# Áreas de interfaz: modal de compartir, modal de importación, modal de exportación, historial, modales de mejora de plan

modals:
  # ========================================
  # Títulos genéricos de modales - Títulos comunes
  # ========================================
  titles:
    confirm: Confirmar # Título genérico de modal de confirmación
    delete: Eliminar # Título de modal de confirmación de eliminación
    remove: Quitar # Título de modal de confirmación de eliminación
    rename: Renombrar # Título de modal para renombrar

  # ========================================
  # Diálogos de confirmación - Genéricos y específicos
  # ========================================
  confirmation:
    default:
      message: ¿Seguro que quieres continuar con esta acción? # Mensaje de confirmación por defecto
      checkbox: No volver a mostrar esto # Casilla para desactivar futuras confirmaciones
    deleteDiagram:
      message: ¿Seguro que quieres eliminar este diagrama? Esta acción no se puede deshacer. # Advertencia al eliminar diagrama
      warning: Ten en cuenta que esta acción no se puede deshacer. # Advertencia adicional
      embedLinkActive: Tienes un enlace incrustado activo. # Advertencia sobre enlaces incrustados
      lastViewed: Visto por última vez # Etiqueta de última visualización
    removeWorkspace:
    removeMember:
      title: Quitar miembro # Título del modal para quitar miembro
      message: ¿Seguro que quieres quitar este miembro del espacio de trabajo? # Confirmación para quitar miembro
      suggestion: Escribe tu email para confirmar. # Mensaje del campo de confirmación

  # ========================================
  # Modal de compartir - Compartir diagrama
  # ========================================
  share:
    tabs:
      sharing: Compartir # Etiqueta de la pestaña Compartir
      embedding: Incrustar # Etiqueta de la pestaña Incrustar
    generalAccess:
      passwordPlaceholder: Introduce una contraseña # Placeholder del campo de contraseña
      createPassword: Crear # Botón para crear contraseña
      updatePassword: Actualizar # Botón para actualizar contraseña
      canAccess: puede acceder # Texto auxiliar
      copyLink: Copiar enlace # Botón para copiar enlace
      updatePasswordButton: Actualizar contraseña # Botón para actualizar contraseña
    permissions:
      canEditAndInvite: Puede editar e invitar # Etiqueta de permiso
      canEditAndInviteDesc: Puede editar e invitar personas. # Descripción del permiso
      canEdit: Puede editar # Etiqueta de permiso
      canEditDesc: Puede editar, pero no invitar personas. # Descripción del permiso
      canView: Puede ver # Etiqueta de permiso
      canViewDesc: Puede ver, pero no editar. # Descripción del permiso
      remove: Quitar # Botón para quitar
      removeDesc: Quitar este colaborador. # Descripción de quitar
      noAccess: Sin acceso # Etiqueta sin acceso
      noAccessDesc: Sin acceso a este diagrama # Descripción sin acceso
    invite:
      placeholder: Emails separados por coma o espacio # Placeholder del campo de email
      button: Invitar # Botón para invitar
    members:
      you: (tú) # Etiqueta para el usuario actual
    confirmRemoveCollaborator: Estás a punto de quitar a <b>{email}</b> de los colaboradores. Confirma la acción. # Mensaje de confirmación para quitar colaborador
    errors:
      publicPermissionUpdateFailed: No se pudo actualizar el permiso público del diagrama. Inténtalo de nuevo. # Mensaje de error
      publicPermissionUpdated: Permiso público del diagrama actualizado. # Mensaje de éxito
      passwordLength: La contraseña debe tener entre 6 y 128 caracteres # Error de validación
      cannotUpdateDiagramState: No se puede actualizar el estado del diagrama # Mensaje de error
      createPasswordFailed: No se pudo crear la contraseña # Mensaje de error
      updatePasswordFailed: No se pudo actualizar la contraseña # Mensaje de error
    success:
      createPasswordSuccess: Contraseña creada correctamente # Mensaje de éxito al crear contraseña
      updatePasswordSuccess: Contraseña actualizada correctamente # Mensaje de éxito al actualizar contraseña
      diagramIsPublic: El diagrama ahora es público. # Mensaje de éxito al hacer público el diagrama
      diagramIsPrivate: El diagrama ahora es privado. # Mensaje de éxito al hacer privado el diagrama
      diagramIsProtected: El diagrama ahora está protegido. # Mensaje de éxito al proteger el diagrama
    permissionChanged: Tus permisos han cambiado. Recarga para aplicar los cambios. # Aviso de cambio de permisos
    reload: Recargar # Botón de recarga
    cannotGetPermission: No se puede obtener el permiso del diagrama. Inténtalo de nuevo. # Mensaje de error
    embedLink:
      title: Enlace incrustado # Título de la sección de enlace incrustado
      lastView: Última vista # Etiqueta de última visualización
      customize: Personaliza tu enlace incrustado con opciones # Etiqueta de personalización
      darkMode: Modo oscuro # Interruptor de modo oscuro
      highlightRelationships: Resaltar relaciones # Interruptor para resaltar relaciones
      detailLevel: Nivel de detalle # Etiqueta del desplegable de nivel de detalle
      anyoneWithLink: Cualquier persona con el enlace puede ver el diagrama incrustado. # Texto de ayuda
      remove: ¿Quieres eliminar este enlace incrustado? Otras personas ya no podrán acceder a él. # Confirmación de eliminación
      generate: Generar enlace incrustado # Botón para generar enlace
      errors:
        cannotGet: No se pueden obtener los enlaces incrustados. Inténtalo de nuevo. # Mensaje de error
        cannotCreate: No se puede crear el enlace incrustado. Inténtalo de nuevo. # Mensaje de error
        cannotDelete: No se puede eliminar el enlace incrustado. Inténtalo de nuevo. # Mensaje de error
        cannotUpdate: No se puede actualizar la configuración del enlace incrustado. Inténtalo de nuevo. # Mensaje de error
    tooltip:
      viewOnly: El permiso de este usuario está limitado solo a visualización. # Tooltip de permiso
      upgradePersonal: Para habilitar la colaboración con edición, mejora tu espacio de trabajo personal. # Tooltip de mejora
      freeAccount: Este usuario tiene una cuenta <b>gratuita</b>. # Tooltip de cuenta gratuita
      editAfterUpgrade: Podrá <b>editar</b> el diagrama después de mejorar su cuenta. # Tooltip de mejora
      collaborationLimit: Solo puedes colaborar con # Texto de límite de colaboración
      diagramLimit: Hasta 4 usuarios gratuitos en cada diagrama (actualmente {count} usuarios) # Texto de límite por diagrama
      workspaceLimit: Hasta 6 usuarios gratuitos en todos los diagramas (actualmente {count} usuarios) # Texto de límite del espacio de trabajo

  # ========================================
  # Diagrama privado - Protección con contraseña
  # ========================================
  private:
    protected: Diagrama protegido # Insignia de protegido
    private: Este diagrama es privado # Insignia de privado
    passwordRequired: Necesitas una contraseña para ver este diagrama. # Mensaje de contraseña requerida
    noAccess: No tienes acceso a este diagrama. # Mensaje sin acceso
    enterPassword: Introduce tu contraseña # Placeholder del campo de contraseña
    incorrectPassword: Contraseña incorrecta # Error de contraseña incorrecta
    tryAgain: Inténtalo de nuevo. # Botón para reintentar
    viewDiagram: Ver diagrama # Botón para ver diagrama

  # ========================================
  # Modal de publicación - Publicar en DBDocs
  # ========================================
  publish:
