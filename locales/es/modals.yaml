    reviewAndPublishTitle: Revisar y publicar en # Título del modal de revisión y publicación
    dbdocsLink: dbdocs # Etiqueta del enlace
    cancelButton: Cancelar # Botón cancelar
    publishButton: Publicar # Botón publicar
    reviewAndPublishButton: Revisar y publicar # Botón publicar
    bullet1: Publica una nueva documentación de base de datos de tu diagrama visible en la web. # Punto de característica
    bullet2: El documento publicado estará disponible en una cuenta de dbdocs vinculada a tu email. # Punto de característica
    bullet3: Los cambios en tu diagrama no actualizarán automáticamente el documento de dbdocs. # Punto de característica
    publishNewOrUpdate: Publicar un nuevo documento / Actualizar uno existente # Título de sección
    updateExisting: Actualizar un documento existente # Opción de actualizar
    publishNewOption: Publicar un nuevo documento # Opción de publicar nuevo documento
    projectPublicDefault: Tu proyecto de dbdocs está configurado como "público" por defecto. Las personas pueden acceder mediante su enlace. # Información de público por defecto
    documentProjectName: Nombre del proyecto de documentación # Etiqueta del campo de nombre de proyecto
    enterProjectName: Introduce el nombre del proyecto # Placeholder del nombre de proyecto
    options: Opciones # Título de opciones
    ownerOnlyUpdatePublishDestination: Solo el propietario del diagrama puede actualizar el destino de publicación # Mensaje para no propietarios
    passwordProtection: Protección con contraseña (opcional) # Título de sección de contraseña
    passwordPlaceholder: Introduce una contraseña # Placeholder de contraseña
    passwordMinLength: La contraseña debe tener al menos 6 caracteres # Validación de contraseña
    feedback: Danos tu # Etiqueta de feedback
    feedbackLink: opinión # Enlace de feedback
    aboutThisFeature: sobre esta función. # Sufijo del enlace de feedback
    errorLoadingProjects: Ha ocurrido un error al cargar los proyectos publicados. Contacta con nuestro soporte en dbdiagram@holistics.io # Mensaje de error
    errorPublishing: Ha ocurrido un error al publicar el proyecto. Contacta con nuestro soporte en dbdiagram@holistics.io # Mensaje de error
    projectNameEmpty: El nombre del proyecto no puede estar vacío # Error de validación
    projectNameInvalid: El nombre del proyecto solo puede contener letras, números, espacios, "-" o "_" # Error de validación
    projectNameExists: Ya existe un proyecto con este nombre/URL. Elige un nombre diferente. # Error de validación por duplicado
    passwordInvalid: Contraseña no válida. Inténtalo de nuevo. # Error de validación
    editFromDbdocsInfo: Para editar un proyecto publicado, puedes hacerlo directamente desde dbdocs. # Información sobre edición desde dbdocs
    learnMore: Más información # Texto de enlace
    ownerOnlyPublish: Solo el propietario del diagrama puede publicar un nuevo proyecto en dbdocs. # Mensaje para no propietarios
    publishedProject: Proyecto publicado # Etiqueta de proyecto publicado
    viewExistingProjects: Ver proyectos existentes # Enlace para ver proyectos existentes
    projectNameHeader: Nombre # Encabezado de columna de nombre de proyecto
    projectUrlHeader: URL # Encabezado de columna de URL del proyecto
    publishNewQuestion: ¿Quieres publicar en otro proyecto? # Pregunta para publicar en nuevo proyecto
    publishNewAction: Publicar en un nuevo proyecto # Texto del enlace de acción
    resolveConflictsAndErrorsBeforePublish: Resuelve todos los conflictos y errores antes de publicar. # Aviso para resolver conflictos y errores
    currentChange: Cambio actual # Texto marcador de conflicto
    incomingChange: Cambio entrante # Texto marcador de conflicto
    bothChanges: Ambos cambios # Texto marcador de conflicto
    acceptChangeButton: Aceptar {conflictTypeText} # Botón para aceptar cambio
    acceptAllIncomingChangesButton: Aceptar todos los cambios entrantes # Botón para aceptar todos los cambios entrantes
    conflictWordSingular: conflicto # Palabra singular para contar conflictos
    conflictWordPlural: conflictos # Palabra plural para contar conflictos

  # ========================================
  # Modal de importación - Importar diagrama
  # ========================================
  import:
    instructions: Instrucciones # Título de sección de instrucciones
    showInstructions: Mostrar instrucciones # Botón para mostrar instrucciones
    hideInstructions: Ocultar instrucciones # Botón para ocultar instrucciones
