    appendMode: Añadir el DBML convertido al final # Interruptor de modo añadir
    modal:
      validating: Validando # Título del modal de validación
    dbConnection:
      title: Generar DBML desde una conexión directa a base de datos # Título del modal de importación por CLI
      intro1: Este método se conecta directamente a tu base de datos y lee su esquema, normalmente desde INFORMATION_SCHEMA, para generar código DBML. # Texto introductorio 1
      intro2: Todo se ejecuta en tu máquina local, y las credenciales de la base de datos no se rastrean ni se envían a ningún sitio. # Texto introductorio 2
      intro3: El código es open source desde el # Texto introductorio 3
      intro3Link: y se puede comprobar # Texto del enlace
      step1: 1. Instala # Etiqueta del paso 1
      step1Note: puede que necesites añadir # Texto de nota
      step1NoteSudo: antes de tus comandos en Linux # Nota sobre sudo
      step2: 2. Ejecuta el siguiente comando # Etiqueta del paso 2
      exampleFor: Ejemplo para # Etiqueta de ejemplo
      successMessage: 'Archivo DBML generado desde la conexión de la base de datos: database.dbml' # Mensaje de éxito
      successBigquery: 'Nota: Para BigQuery, tu archivo JSON de credenciales debe contener las siguientes claves' # Nota de BigQuery
      successSnowflake1: Intentando conectar... # Paso Snowflake 1
      successSnowflake2: Ejecutando consulta... # Paso Snowflake 2
      successSnowflake3: Consulta ejecutada correctamente. # Paso Snowflake 3
      successSnowflake4: Conexión cerrada correctamente. # Paso Snowflake 4
      step3: 3. Copia y pega el DBML generado en el panel de código para visualizar tu base de datos. # Etiqueta del paso 3
      databaseTypes:
        mysql: MySQL # Etiqueta de tipo de base de datos
        postgres: PostgreSQL # Etiqueta de tipo de base de datos
        mssql: SQL Server # Etiqueta de tipo de base de datos
        oracle: Oracle # Etiqueta de tipo de base de datos
        snowflake: Snowflake # Etiqueta de tipo de base de datos
        bigquery: BigQuery # Etiqueta de tipo de base de datos

