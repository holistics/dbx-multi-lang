    savePngFailed: No se puede guardar tu PNG # Error toast
    cannotGetDiagrams: ¡No se pueden obtener los diagramas, por favor intenta recargar la aplicación! # Error toast
    cannotRemoveDefaultView: ¡No se te permite eliminar la vista predeterminada! # Error toast
