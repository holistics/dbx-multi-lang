      diagramView: En el plan gratuito, solo puedes guardar la vista por defecto.<br>Mejora a uno de nuestros planes de pago ahora para tener <b>vistas de diagrama ilimitadas</b> y otras funciones avanzadas. # Descripción
      headerColor: Mejora a uno de nuestros planes de pago ahora para obtener niveles de detalle, color de encabezado,<br>color de relación, grupo de tablas y acceso a todas nuestras próximas funciones. # Descripción
      headerColorDbdocs: Mejora tu proyecto para obtener niveles de detalle, color de encabezado,<br>color de relación, grupo de tablas y acceso a todas nuestras próximas funciones. # Descripción DBDocs
      privateDiagram: Mejora a uno de nuestros planes de pago ahora para proteger tus diagramas con<br><strong> protección con contraseña, modo privado </strong> y otras funciones avanzadas. # Descripción
      stickyNotes: Mejora a uno de nuestros planes de pago ahora para incluir<strong> notas adhesivas </strong> en tu diagrama<br>y aprovechar otras funciones avanzadas. # Descripción
      stickyNotesDbdocs: Mejora tu proyecto para incluir<strong> notas adhesivas </strong> en tu diagrama<br>y aprovechar otras funciones avanzadas. # Descripción DBDocs
      versionHistory: Experimenta libremente tus ideas con distintas <b>versiones de esquema</b>.<br>Vuelve a una versión anterior cuando quieras. # Descripción
      aiAssistant: Mejora a uno de nuestros planes de pago ahora para diseñar y optimizar tus esquemas de base de datos<br>con <strong>asistencia de IA basada en lenguaje natural</strong> # Descripción
      tableGroup: Mejora a uno de nuestros planes de pago ahora para obtener niveles de detalle, color de encabezado,<br>grupo de tablas y acceso a todas nuestras próximas funciones. # Descripción
      tableGroupDbdocs: Mejora tu proyecto para obtener niveles de detalle, color de encabezado,<br>grupo de tablas y acceso a todas nuestras próximas funciones. # Descripción DBDocs
      invitePeople: Mejora a uno de nuestros planes de pago ahora para colaborar en el diseño de diagramas ER con<br><strong> invitación de colaboradores, publicación de diagramas editables </strong> y otras funciones avanzadas. # Descripción
    buttons:
      viewPlans: Ver planes # Botón para ver planes
      upgradeProject: Mejorar proyecto # Botón para mejorar proyecto

