    createTableGroups: 按领域和功能将表组织成逻辑组，并使用不同颜色
    addTimestampColumns: 为需要审计跟踪的表添加 created_at 和 updated_at 列
    addRelationships: 根据命名约定自动检测并添加外键关系
    addIndexes: 为外键和常用查询列添加索引块
    learnDatabaseDesign: 学习数据库设计
    cloneSlack: 创建 Slack 克隆
    documentDatabase: 创建用于存储文档的数据库
    todoList: 创建待办事项列表应用
    remapDataTypes: 转换数据类型以匹配目标数据库系统
