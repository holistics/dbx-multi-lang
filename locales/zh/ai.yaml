      欢迎使用 dbdiagram AI。

      我可以帮你：

      • **DBML 模式设计** - 创建和修改表、关系和数据库结构
      • **数据库最佳实践** - 建议最佳数据类型、索引和约束
      • **模式优化** - 用表组整理表、添加时间戳、重新映射数据类型
      • **快速转换** - 在数据库系统之间转换（PostgreSQL、MySQL、SQL Server 等）

