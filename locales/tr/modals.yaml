# Modals translations - Modal dialogs throughout the app
# UI Areas: Share modal, Import modal, Export modal, History modal, Upgrade modals

modals:
  # ========================================
  # Generic modal titles - Common titles
  # ========================================
  titles:
    confirm: Onayı Doğrula # Generic confirm modal title
    delete: Sil # Delete confirmation modal title
    remove: Kaldır # Remove confirmation modal title
    rename: Yeniden Adlandır # Rename modal title

  # ========================================
  # Confirmation dialogs - Generic and specific
  # ========================================
  confirmation:
    default:
      message: Bu işleme devam etmek istediğinizden emin misiniz? # Default confirmation message
      checkbox: Bunu bir daha gösterme # Checkbox to disable future confirmations
    deleteDiagram:
      message: Bu diyagramı silmek istediğinizden emin misiniz? Bu işlem geri alınamaz. # Delete diagram warning
      warning: Lütfen bu işlemin geri alınamayacağını unutmayın! # Additional warning
      embedLinkActive: Aktif bir gömülü (embed) bağlantınız var. # Warning about embed links
      lastViewed: Son görüntülenme # Label for last viewed timestamp
    removeWorkspace:
    removeMember:
      title: Üyeyi Çıkar # Remove member modal title
      message: Bu üyeyi çalışma alanından çıkarmak istediğinizden emin misiniz? # Remove member confirmation
      suggestion: Lütfen onaylamak için e-posta adresinizi girin. # Input prompt for confirmation

  # ========================================
  # Share modal - Diagram sharing
  # ========================================
  share:
    tabs:
      sharing: Paylaşım # Sharing tab label
      embedding: Gömme (Embedding) # Embedding tab label
    generalAccess:
      passwordPlaceholder: Parolayı girin # Password input placeholder
      createPassword: Oluştur # Create password button
      updatePassword: Güncelle # Update password button
      canAccess: erişebilir # Helper text suffix
      copyLink: Bağlantıyı kopyala # Copy link button
      updatePasswordButton: Parolayı güncelle # Update password button
    permissions:
      canEditAndInvite: Düzenleyebilir ve davet edebilir # Permission label
      canEditAndInviteDesc: İnsanları düzenleyebilir ve davet edebilir. # Permission description
      canEdit: Düzenleyebilir # Permission label
      canEditDesc: Düzenleyebilir, ancak davet edemez. # Permission description
      canView: Görüntüleyebilir # Permission label
      canViewDesc: Görüntüleyebilir, ancak düzenleyemez. # Permission description
      remove: Kaldır # Remove button
      removeDesc: Bu işbirlikçiyi çıkar. # Remove description
      noAccess: Erişim yok # No access label
      noAccessDesc: Bu diyagrama erişim yok # No access description
    invite:
      placeholder: E-posta adresleri (virgül veya boşluk ile ayırın) # Email input placeholder
      button: Davet Et # Invite button
    members:
      you: (siz) # Label for current user
    confirmRemoveCollaborator: İşbirlikçilerden <b>{email}</b> adlı kişiyi çıkarmak üzeresiniz, lütfen işleminizi onaylayın! # Remove confirmation message
    errors:
      publicPermissionUpdateFailed: Diyagramın genel erişim izni güncellenemedi, lütfen tekrar deneyin! # Error toast
      publicPermissionUpdated: Diyagramın genel erişim izni güncellendi! # Success toast
      passwordLength: Parola 6 ile 128 karakter arasında olmalıdır # Validation error
      cannotUpdateDiagramState: Diyagram durumu güncellenemiyor # Error toast
      createPasswordFailed: Parola oluşturma başarısız oldu # Error toast
      updatePasswordFailed: Parola güncelleme başarısız oldu # Error toast
    success:
      createPasswordSuccess: Parola başarıyla oluşturuldu # Success toast for password creation
      updatePasswordSuccess: Parola başarıyla güncellendi # Success toast for password update
      diagramIsPublic: Diyagram artık herkese açık! # Success toast for making diagram public
      diagramIsPrivate: Diyagram artık gizli! # Success toast for making diagram private
      diagramIsProtected: Diyagram artık korumalı! # Success toast for making diagram protected
    permissionChanged: İzinleriniz değiştirildi, değişiklikleri uygulamak için lütfen sayfayı yenileyin! # Permission change toast
    reload: Yenile # Reload button
    cannotGetPermission: Diyagram izinleri alınamıyor, lütfen tekrar deneyin! # Error toast
    embedLink:
      title: Gömülü (Embed) Bağlantı # Embed link section title
      lastView: Son görüntülenme # Last viewed label
      customize: Seçeneklerle gömülü (embed) bağlantınızı özelleştirin # Customize label
      darkMode: Karanlık mod # Dark mode toggle label
      highlightRelationships: İlişkileri vurgula # Highlight toggle label
      detailLevel: Detay seviyesi # Detail level dropdown label
      anyoneWithLink: Bağlantıya sahip olan herkes gömülü diyagramı görüntüleyebilir. # Help text
      remove: Bu gömülü bağlantıyı kaldırmak istiyor musunuz? Diğer kişiler artık bu bağlantıya erişemeyecek. # Remove confirmation
      generate: Gömülü (embed) bağlantı oluştur # Generate button
      errors:
        cannotGet: Gömülü (embed) bağlantılar alınamıyor, lütfen tekrar deneyin! # Error toast
        cannotCreate: Gömülü (embed) bağlantı oluşturulamıyor, lütfen tekrar deneyin! # Error toast
        cannotDelete: Gömülü (embed) bağlantı silinemiyor, lütfen tekrar deneyin! # Error toast
        cannotUpdate: Gömülü bağlantı ayarları güncellenemiyor, lütfen tekrar deneyin! # Error toast
    tooltip:
      viewOnly: Bu kullanıcının izni yalnızca görüntüleme ile sınırlıdır. # Permission tooltip
      upgradePersonal: Düzenleme ortaklığını etkinleştirmek için lütfen kişisel çalışma alanınızı yükseltin. # Upgrade tooltip
      freeAccount: Bu kullanıcının <b>ücretsiz</b> bir hesabı var. # Free account tooltip
      editAfterUpgrade: Hesabını yükselttikten sonra diyagramı <b>düzenlemesine</b> izin verilecektir. # Upgrade tooltip
      collaborationLimit: "Yalnızca şu kadarıyla işbirliği yapabilirsiniz:" # Collaboration limit text
      diagramLimit: Her diyagramda en fazla 4 ücretsiz kullanıcıya kadar (şu an {count} kullanıcı) # Diagram limit text
      workspaceLimit: Tüm diyagramlarda en fazla 6 ücretsiz kullanıcıya kadar (şu an {count} kullanıcı) # Workspace limit text

  # ========================================
  # Private diagram - Password protection
  # ========================================
  private:
    protected: Korumalı diyagram # Protected badge
    private: Bu diyagram gizli # Private badge
    passwordRequired: Bu diyagramı görüntülemek için bir parolaya ihtiyacınız var. # Password required message
    noAccess: Bu diyagrama erişiminiz yok. # No access message
    enterPassword: Parolanızı girin # Password input placeholder
    incorrectPassword: Yanlış parola # Incorrect password error
    tryAgain: Lütfen tekrar deneyin! # Try again button
    viewDiagram: Diyagramı Görüntüle # View diagram button

  # ========================================
  # Publish modal - Publish to DBDocs
  # ========================================
  publish:
    title: "Şuraya Yayımla:" # Modal title (publish dropdown)
    publishedTitle: "Şuraya Yayımlandı:" # Modal title for published diagram
    dbdocsLink: dbdocs # Link label
    publishButton: Yayımla # Publish button
    bullet1: Diyagramınızın web üzerinden görüntülenebilen yeni bir veritabanı dokümantasyonunu yayımlayın. # Feature bullet point
    bullet2: Yayımlanan belge, e-postunuza bağlı bir dbdocs hesabında erişilebilir olacaktır. # Feature bullet point
    bullet3: Diyagramınızdaki değişiklikler, dbdocs belgesini otomatik olarak güncellemeyecektir. # Feature bullet point
    projectPublicDefault: dbdocs projeniz varsayılan olarak "herkese açık" (public) ayarlanmıştır. Kişiler bağlantı aracılığıyla erişim sağlayabilir. # Public default info
    documentProjectName: Belge proje adı # Project name field label
    enterProjectName: Proje adını girin # Project name placeholder
    options: Seçenekler # Options section title
    passwordProtection: Parola koruması # Password section title
    passwordOptional: Bir parola girin (isteğe bağlı) # Password placeholder
    passwordMinLength: Parola en az 6 karakter olmalıdır # Password validation
    feedback: Bu özellik hakkındaki # Feedback label
    feedbackLink: geri bildirimleriniz # Feedback link
    aboutThisFeature: için bize ulaşın! # Feedback link suffix
    errorLoadingProjects: Yayımlanmış projeler yüklenirken bir hata oluştu, lütfen dbdiagram@holistics.io adresinden destek ekibimizle iletişime geçin # Error toast
    errorPublishing: Proje yayımlanırken bir hata oluştu, lütfen dbdiagram@holistics.io adresinden destek ekibimizle iletişime geçin # Error toast
    projectNameEmpty: Proje adı boş olamaz # Validation error
    projectNameInvalid: Proje adı yalnızca harf, sayı, boşluk, "-" veya "_" içerebilir # Validation error
    projectNameExists: Bu isme/adrese (url) sahip bir proje zaten var. Lütfen farklı bir isim seçin. # Validation error for duplicate name/url
    passwordInvalid: Geçersiz parola, lütfen tekrar deneyin! # Validation error
    editFromDbdocsInfo: Yayımlanmış bir projeyi düzenlemek için bunu doğrudan dbdocs üzerinden yapabilirsiniz. # Info about editing from dbdocs
    learnMore: Daha fazla bilgi edin # Learn more link text
    ownerOnlyPublish: Yeni bir projeyi dbdocs'ta yalnızca diyagram sahibi yayımlayabilir. # Non-owner message
    publishedProject: Yayımlanmış proje # Label for published project
    viewExistingProjects: Mevcut projeleri görüntüle # Link to view existing projects popover
    projectNameHeader: İsim # Header for project name column in popover
    projectUrlHeader: URL # Header for project URL column in popover
    publishNewQuestion: Başka bir projeye mi yayımlamak istiyorsunuz? # Prompt to publish to a new project
    publishNewAction: Yeni bir projeye yayımla # Action link text

  # ========================================
  # Import modal - Import diagram
  # ========================================
  import:
    instructions: Talimatlar # Instructions section title
    showInstructions: Talimatları göster # Show instructions button
    hideInstructions: Talimatları gizle # Hide instructions button
    upload: Yükle ({file}) # Upload button label
    appendMode: Dönüştürülen DBML'i sonuna ekle # Append mode toggle
    modal:
      validating: Doğrulanıyor # Validating modal title
    dbConnection:
      title: Doğrudan Veritabanı Bağlantısından DBML Oluştur # CLI import modal title
      intro1: Bu yöntem, doğrudan veritabanınıza bağlanır ve DBML kodunu oluşturmak için veritabanı şemanızı okur (genellikle INFORMATION_SCHEMA'dan okur). # Intro text part 1
      intro2: Her şey yerel makinenizde çalışır, veritabanı kimlik bilgileri izlenmez veya hiçbir yere gönderilmez. # Intro text part 2
      intro3: Kaynak kodumuz açık kaynaktır ve # Intro text part 3
      intro3Link: kontrol edilebilir # Link text
      step1: 1. İndirin # Step 1 label
      step1Note: Linux'ta komutlarınızdan önce # Note text
      step1NoteSudo: başına sudo eklemeniz gerekebilir # Sudo note
      step2: "2. Şu komutu çalıştırın:" # Step 2 label
      exampleFor: "Örnek:" # Example label
      successMessage: "Veritabanı bağlantısından üretilen DBML dosyası: database.dbml" # Success message
      successBigquery: "Not: BigQuery için JSON kimlik doğrulama dosyanız şu anahtarları içermelidir" # BigQuery note
      successSnowflake1: Bağlanmaya çalışılıyor... # Snowflake step 1
      successSnowflake2: Sorgu çalıştırılıyor... # Snowflake step 2
      successSnowflake3: Sorgu başarıyla çalıştırıldı. # Snowflake step 3
      successSnowflake4: Bağlantı başarıyla sonlandırıldı. # Snowflake step 4
      step3: 3. Üretilen DBML'i kopyalayıp, veritabanınızı görselleştirmek için kod paneline yapıştırın. # Step 3 label
      databaseTypes:
        mysql: MySQL # Database type label
        postgres: PostgreSQL # Database type label
        mssql: SQL Server # Database type label
        oracle: Oracle # Database type label
        snowflake: Snowflake # Database type label
        bigquery: BigQuery # Database type label

