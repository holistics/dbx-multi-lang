    cannotGetUserWorkspaces: Kullanıcı çalışma alanları alınamıyor, lütfen tekrar deneyin! # Error toast
    cannotGetWorkspacesSubscription: Çalışma alanlarının abonelik durumu alınamıyor, lütfen tekrar deneyin! # Error toast
    exportSqlFailed: SQL dışa aktarılamadı, lütfen veritabanı şemanızı güncelleyip tekrar deneyin. # Error toast
    savePdfFailed: PDF olarak kaydedilemedi # Error toast
    saveSvgFailed: SVG olarak kaydedilemedi # Error toast
    savePngFailed: PNG olarak kaydedilemedi # Error toast
    cannotGetDiagrams: Diyagramlar alınamıyor, lütfen uygulamayı yeniden yüklemeyi deneyin! # Error toast
    cannotRemoveDefaultView: Varsayılan görünümü kaldırma izniniz yok! # Error toast
    cannotRemoveView: Bu görünüm kaldırılamıyor, lütfen sayfayı yenileyip tekrar deneyin! # Error toast
    removeViewTitle: Diyagram Görünümü Kaldırılsın Mı? # Remove view modal title
    removeViewContent: '"{name}" görünümünü kaldırmak istiyor musunuz?' # Remove view confirmation
    cancel: İptal # Cancel button
    removeView: Görünümü Kaldır # Remove view button
    close: Kapat # Close button
    reload: Yenile # Reload button

