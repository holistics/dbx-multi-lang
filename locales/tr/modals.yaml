  # ========================================
  migrationPreview:
    title: Diyagram Görünümleri artık DBML'inizde saklanıyor
    description: >-
      Diyagram görünümü ayarlarınızı DBML kodunuzda doğrudan DiagramView blokları olarak taşıdık.
      Bu sayede görünümleriniz şemanızla birlikte DBML kodunuzun bir parçası haline gelir.
    learnMore: Diyagram Görünümleri hakkında daha fazla bilgi edinin
    confirm: Devam et
