  # Upgrade modals - Feature upgrade prompts
  # ========================================
  upgrade:
    titles:
      createDiagram: Diyagram oluşturma limitine ulaştınız! # Diagram limit title
      detailLevels: Ücretli bir özellik keşfettiniz! # Detail levels title
      detailLevelsDbdocs: Ücretli projelere ait bir özellik keşfettiniz! # DBDocs detail levels title
      diagramView: Daha fazla görünüm oluşturmak ücretli bir özelliktir # Diagram view title
      headerColor: Ücretli bir özellik keşfettiniz! # Header color title
      headerColorDbdocs: Ücretli projelere ait bir özellik keşfettiniz! # DBDocs header color title
      privateDiagram: Ücretli bir özellik keşfettiniz! # Private diagram title
      stickyNotes: Ücretli bir özellik keşfettiniz! # Sticky notes title
      stickyNotesDbdocs: Ücretli projelere ait bir özellik keşfettiniz! # DBDocs sticky notes title
      versionHistory: Ücretli bir özellik keşfettiniz! # Version history title
      aiAssistant: dbdiagram AI Asistanı ücretli bir özelliktir # AI assistant title
      tableGroup: Ücretli bir özellik keşfettiniz! # Table group title
      tableGroupDbdocs: Ücretli projelere ait bir özellik keşfettiniz! # DBDocs table group title
      invitePeople: Ücretli bir özellik keşfettiniz! # Invite people title
    descriptions:
      createDiagram: Şimdi ücretli planlarımıza geçerek <b>sınırsız<br>diyagram oluşturma</b> ve diğer gelişmiş özelliklerden faydalanın! # Description
      detailLevels: Detay Seviyeleri, Başlık Rengi,<br>Tablo Gruplandırma ve yaklaşan tüm özelliklerimize erişim sağlamak için hemen ücretli planlarımıza yükseltin! # Description
      detailLevelsDbdocs: Detay Seviyeleri, Başlık Rengi,<br>Tablo Gruplandırma ve yaklaşan tüm özelliklerimize ücretsiz erişim sağlamak için projenizi yükseltin! # DBDocs description
      diagramView: Ücretsiz planda yalnızca varsayılan görünümü kaydedebilirsiniz.<br><b>Sınırsız diyagram görünümü</b> ve diğer özellikler için ücretli planlarımıza geçin! # Description
      headerColor: Detay Seviyeleri, Başlık Rengi,<br>İlişki Rengi, Tablo Gruplandırma ve tüm gelecek özelliklerimiz için hemen ücretli planlarımıza yükseltin! # Description
      headerColorDbdocs: Detay Seviyeleri, Başlık Rengi,<br>İlişki Rengi, Tablo Gruplandırma ve tüm gelecek özelliklerimiz için hemen projenizi yükseltin! # DBDocs description
      privateDiagram: Diyagramlarınızı<br><strong> Parola Koruması, Gizlilik Modu </strong> ve diğer gelişmiş özelliklerle korumak için ücretli planlarımıza yükseltin! # Description
      stickyNotes: Diyagramlarınıza<strong> Yapışkan Notlar </strong> eklemek<br>ve diğer özelliklerimizden yararlanmak için ücretli planlarımıza yükseltin! # Description
      stickyNotesDbdocs: Diyagramlarınıza<strong> Yapışkan Notlar </strong> eklemek<br>ve diğer özelliklerimizden yararlanmak için projenizi yükseltin! # DBDocs description
      versionHistory: Farklı <b>şema sürümleri</b> ile fikirlerinizi özgürce deneyimleyin.<br>Dilediğiniz zaman geçmiş bir sürüme dönebilirsiniz. # Description
      aiAssistant: Veritabanı şemalarınızı tasarlamak ve optimize etmek için<br><strong>Yapay zeka destekli doğal dil asistanı</strong> ile ücretli planlarımıza yükseltin! # Description
      tableGroup: Detay Seviyeleri, Başlık Rengi,<br>Tablo Gruplandırma ve yaklaşan tüm özelliklerimize erişim sağlamak için ücretli planlarımıza yükseltin! # Description
      tableGroupDbdocs: Detay Seviyeleri, Başlık Rengi,<br>Tablo Gruplandırma ve yaklaşan tüm özelliklerimize erişim sağlamak için projenizi yükseltin! # DBDocs description
      invitePeople: ER diyagramlarını<br><strong> İşbirlikçileri Davet Etme, Düzenlenebilir Diyagramları Yayımlama </strong> ve diğer gelişmiş özelliklerle tasarlamak için hemen ücretli bir plana geçin! # Description
    buttons:
      viewPlans: Planları İncele # View plans button
      upgradeProject: Projeyi Yükselt # Upgrade project button

  # ========================================
