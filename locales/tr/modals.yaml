    inviteMaxEmails: 50'den fazla e-posta davet edilemez # Validation error
    inviteFailed: Davet gönderilemedi, lütfen tekrar deneyin! # Error toast
    cannotGetCollaborators: İşbirlikçilerin bilgisi alınamıyor! # Error toast
