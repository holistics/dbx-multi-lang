# Account translations - Manage Account modal and Change Email flow
# UI Areas: Manage Account modal, Change Email modal (stepper flow)

account:
  page:
    title: Quản lý tài khoản dbx của bạn
    description: "Mọi thay đổi bạn thực hiện ở đây sẽ được áp dụng cho cả ba dịch vụ:"
    authenticating: Đang xác thực...

  # ========================================
  # Manage Account modal - Account settings overview
  # ========================================
  manage:
    loadingInfo: Đang tải thông tin tài khoản...
    displayName: Tên hiển thị
    email: Email

    connectedAccounts:
      title: Tài khoản liên kết
      noAccounts: Không có tài khoản liên kết
      loggedInWith: Đã đăng nhập bằng {provider}

    manageTitle: Quản lý tài khoản
    changeEmail: Thay đổi địa chỉ email
    changeEmailInProgress: Bạn đang có một thay đổi email đang được xử lý, vui lòng đợi
    changeEmailFailed: "Thay đổi email lần trước đã thất bại, vui lòng liên hệ hỗ trợ tại dbdiagram@holistics.io"

    removal:
      removeAccount: Xóa tài khoản
      cancelRequest: Hủy yêu cầu xóa
      removedAfter: "Tài khoản của bạn sẽ bị xóa sau {time}."
      aFewHours: vài giờ
      aDay: một ngày
      days: "{count} ngày"
      cancelSuccess: Yêu cầu xóa đã được hủy thành công!
      status:
        inProgressTitle: Tài khoản của bạn đang được xóa.
        inProgressDescription: Quá trình này có thể mất vài phút. Bạn có thể đóng cửa sổ này — quá trình sẽ tiếp tục ở nền.
        completedTitle: Tài khoản của bạn đã được xóa thành công.
        completedDescription: "Bạn có thể đóng cửa sổ này. Lưu ý: Bạn sẽ không bị đăng xuất tự động. Vui lòng đăng xuất thủ công từ các thiết bị khác."
        failedTitle: Xóa tài khoản thất bại.
        failedContactSupport: Vui lòng liên hệ đội hỗ trợ của chúng tôi tại

    notifications:
      profileUpdated: Hồ sơ người dùng đã được cập nhật thành công.
      profileImageUpdated: Ảnh hồ sơ người dùng đã được cập nhật thành công.
    profileImage:
      title: Ảnh hồ sơ người dùng
      switchToGravatar: Chuyển sang ảnh hồ sơ Gravatar
      switchToGravatarHint: Để thay đổi ảnh đại diện, vui lòng chuyển sang ảnh hồ sơ Gravatar.
      redirectingToGravatar: Đang chuyển hướng đến Gravatar...
      changeOnGravatar: Thay đổi ảnh hồ sơ trên Gravatar
      doneUploading: Đã tải lên ảnh của bạn trên Gravatar?
      gravatarHint: Đăng nhập vào Gravatar bằng email của bạn để thay đổi ảnh hồ sơ.
      refresh: Làm mới ảnh hồ sơ của bạn
    userInfo:
      title: Thông tin người dùng
    dangerZone:
      title: Vùng nguy hiểm
    errors:
      sessionExpired: Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại.
      updateProfileFailed: Không thể cập nhật hồ sơ người dùng, vui lòng thử lại.
      loadProfileFailed: Không thể tải hồ sơ người dùng, vui lòng thử tải lại trang.
      updateProfileImageFailed: Không thể cập nhật ảnh hồ sơ người dùng, vui lòng thử lại.
      cancelRemovalFailed: Không thể hủy yêu cầu xóa tài khoản, vui lòng thử lại.

  removeAccountModal:
    title: Xóa tài khoản
    loadingAccountData: Đang tải dữ liệu tài khoản…
    steps:
      whatWillBeRemoved: Những gì sẽ bị xóa
      verifyIdentity: Xác minh danh tính của bạn
      identityVerified: Danh tính đã được xác minh
      deleteAccount: Xóa tài khoản
      accountDeleted: Tài khoản đã bị xóa
    step1:
      description: "Việc xóa tài khoản của bạn sẽ xóa vĩnh viễn các dữ liệu sau:"
      warning: Hành động này là vĩnh viễn và không thể hoàn tác.
    step2:
      otpSentTo: Nhập mã 6 chữ số được gửi đến
      resendCode: Gửi lại mã
      resendCodeCooldown: "Gửi lại mã ({seconds}s)"
    step3:
      description: Bạn sắp xóa vĩnh viễn tài khoản và tất cả dữ liệu liên quan. Hành động này không thể hoàn tác.
      confirmButton: Xóa tài khoản của tôi
    errors:
      generic: Đã xảy ra lỗi. Vui lòng thử lại.
      ssoAccount: Tài khoản SSO không thể quản lý cài đặt tài khoản cá nhân.
      removalInProgress: Đang có một tiến trình xóa.

  # ========================================
  # Change Email modal - 4-step email change flow
  # ========================================
  changeEmail:
    title: Thay đổi Email

    steps:
      verifyCurrentEmail: Xác minh Email hiện tại
      currentEmailVerified: Email hiện tại đã được xác minh
      enterNewEmail: Nhập Email mới
      verifyNewEmail: Xác minh Email mới
      newEmailVerified: Email mới đã được xác minh
      confirmChange: Xác nhận thay đổi
      emailChanged: Email đã được thay đổi

    verifyCurrent:
      description: Để bảo mật, bạn cần xác minh email hiện tại qua OTP trước khi thay đổi.
      currentEmailLabel: "Email hiện tại:"
      sendCode: Gửi mã
      otpSentMessage: Chúng tôi đã gửi mã 6 chữ số đến email của bạn. Mã sẽ hết hạn sau 4 phút.
      verificationCode: Mã xác minh
      resendCode: Gửi lại mã
      resendCodeCooldown: "Gửi lại mã ({seconds}s)"
      verify: Xác minh

    enterNew:
      description: Nhập địa chỉ email mới. Chúng tôi sẽ gửi mã xác minh để xác nhận email thuộc về bạn.
      newEmailLabel: Địa chỉ Email mới
      placeholder: Nhập email mới
      sendCode: Gửi mã

    verifyNew:
      otpSentTo: Chúng tôi đã gửi mã 6 chữ số đến
      codeExpires: Mã sẽ hết hạn sau 4 phút.
      verificationCode: Mã xác minh
      resendCode: Gửi lại mã
      resendCodeCooldown: "Gửi lại mã ({seconds}s)"
      back: Quay lại
      verify: Xác minh

    confirm:
      description: "Bạn sắp thay đổi địa chỉ email:"
      from: "Từ:"
      to: "Đến:"
      pleaseNote: "Lưu ý:"
      noteNotifications: Email mới sẽ nhận tất cả thông báo tài khoản (thanh toán, lời mời, v.v.) trong tương lai.
      noteLogout: Bạn sẽ không bị đăng xuất tự động. Vui lòng đăng xuất thủ công từ các thiết bị khác.
      noteIrreversible: Hành động này không thể hoàn tác.
      confirmButton: Xác nhận thay đổi

    polling:
      inProgressTitle: Đang cập nhật email trên các dịch vụ...
      inProgressText: Quá trình này có thể mất vài phút. Bạn vẫn có thể tiếp tục sử dụng ứng dụng.
      completedText: Email đã được cập nhật thành công trên tất cả các dịch vụ!
      failedTitle: Một số dịch vụ không thể đồng bộ email mới của bạn.
      failedText: Email của bạn đã được thay đổi, nhưng một số dịch vụ có thể vẫn hiển thị email cũ. Vui lòng liên hệ hỗ trợ tại dbdiagram@holistics.io.

    errors:
      invalidEmail: Vui lòng nhập địa chỉ email hợp lệ
      incorrectCode: Mã bạn nhập không chính xác
      codeExpired: Mã xác minh đã hết hạn. Vui lòng yêu cầu mã mới.
      codeAlreadyUsed: Mã này đã được sử dụng. Vui lòng yêu cầu mã mới.
      requestExpired: Yêu cầu xác minh của bạn đã hết hạn. Vui lòng yêu cầu mã mới.
      emailInUse: Email này đã được sử dụng bởi tài khoản khác
      verificationExpired: Xác minh của bạn đã hết hạn. Vui lòng bắt đầu lại.
      generic: Đã xảy ra lỗi. Vui lòng thử lại.
